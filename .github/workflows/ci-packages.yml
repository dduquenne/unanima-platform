name: CI — Packages (socle commun)

on:
  push:
    branches: [main, dev]
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.base.json'
  pull_request:
    branches: [main, dev]
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.base.json'

concurrency:
  group: ci-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-all:
    name: Build & Test all packages and apps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [links, creai, omega]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint ${{ matrix.app }}
        run: pnpm lint --filter=@unanima/${{ matrix.app }}

      - name: TypeCheck ${{ matrix.app }}
        run: pnpm --filter=@unanima/${{ matrix.app }} exec tsc --noEmit

      - name: Build ${{ matrix.app }}
        run: pnpm build --filter=@unanima/${{ matrix.app }}

      - name: Test ${{ matrix.app }}
        run: pnpm test --filter=@unanima/${{ matrix.app }}
