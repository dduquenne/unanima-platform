name: CI — Links

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/links/**'
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'turbo.json'
      - 'scripts/check-rpc-consistency.sh'
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/links/**'
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'turbo.json'
      - 'scripts/check-rpc-consistency.sh'

concurrency:
  group: ci-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-rpc:
    name: Cohérence RPC / Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier cohérence RPC ↔ migrations SQL
        run: ./scripts/check-rpc-consistency.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Links
        run: pnpm lint --filter=@unanima/links

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeCheck Links (strict)
        run: pnpm --filter=@unanima/links exec tsc --noEmit

  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tests Links
        run: pnpm test --filter=@unanima/links

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check-rpc, lint, typecheck, test]
    env:
      # Variables Supabase factices pour le build CI (pas de vraie BDD)
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-links-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-links-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Links
        run: pnpm build --filter=@unanima/links
