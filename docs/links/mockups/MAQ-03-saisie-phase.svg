  <rect x="218" y="350" width="1006" height="96" rx="6" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1.5"/>
  <!-- Texte simulé partiellement saisi -->
  <text x="232" y="370" fill="#4A4A4A" font-size="13">Au cours de mes 8 années dans le secteur de la formation, j'ai développé des compétences en ingénierie pédagogique,</text>
  <text x="232" y="388" fill="#4A4A4A" font-size="13">notamment la conception de parcours de formation blended learning. J'ai également renforcé mes capacités d'écoute active</text>
  <text x="232" y="406" fill="#4A4A4A" font-size="13">et d'accompagnement individuel lors des entretiens de développement professionnel avec les collaborateurs.</text>
