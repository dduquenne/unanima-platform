  <!-- Texte saisi -->
  <text x="232" y="538" fill="#4A4A4A" font-size="13">Je pense que mes principaux points forts sont ma capacité à créer du lien avec les personnes que j'accompagne,</text>
  <text x="232" y="556" fill="#4A4A4A" font-size="13">ainsi que mon sens de l'organisation. Je suis également reconnu(e) pour ma pédagogie et ma patience.</text>
