  <text x="284" y="326" font-size="12" fill="#4A4A4A">Échange initial sur le parcours professionnel de Marie Dupont. Revue de son historique professionnel : 8 ans dans la comptabilité, désir de</text>
  <text x="284" y="344" font-size="12" fill="#4A4A4A">reconversion vers les ressources humaines. Identification des compétences transférables (rigueur, organisation, relation client). Marie exprime une</text>
  <text x="284" y="362" font-size="12" fill="#4A4A4A">forte motivation pour le changement, freinée par la peur de la prise de risque financier. Objectifs pour la prochaine séance : compléter le</text>
  <text x="284" y="380" font-size="12" fill="#4A4A4A">questionnaire d'auto-évaluation des soft skills et explorer 3 métiers cibles potentiels.</text>
