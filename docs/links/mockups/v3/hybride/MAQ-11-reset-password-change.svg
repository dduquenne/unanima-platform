<!-- MAQ-11 | Reset Password Change | hybride -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="hybGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0D3B6E"/>
      <stop offset="100%" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="hybShadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Left Panel -->
  <rect x="0" y="0" width="600" height="900" fill="url(#hybGrad)"/>

  <!-- Subtle gradient + color spots -->
  <circle cx="120" cy="180" r="100" fill="#1A5BA0" opacity="0.1"/>
  <circle cx="480" cy="720" r="120" fill="#1A5BA0" opacity="0.08"/>
  <circle cx="150" cy="700" r="6" fill="#FF6B35" opacity="0.4"/>
  <circle cx="450" cy="200" r="5" fill="#FF6B35" opacity="0.35"/>
  <circle cx="350" cy="820" r="4" fill="#FF6B35" opacity="0.3"/>
  <rect x="80" y="350" width="40" height="2" rx="1" fill="#FF6B35" opacity="0.25"/>
  <rect x="480" y="550" width="40" height="2" rx="1" fill="#FF6B35" opacity="0.2"/>

  <!-- Logo -->
  <text x="300" y="395" text-anchor="middle" fill="#FFFFFF" font-size="33" font-weight="700">Link's</text>
  <text x="300" y="435" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="300">Accompagnement</text>
  <rect x="235" y="452" width="130" height="3" rx="1.5" fill="#FF6B35"/>
  <text x="300" y="490" text-anchor="middle" fill="#92B8DA" font-size="14" font-weight="400">Votre parcours de bilan de compétences,</text>
  <text x="300" y="512" text-anchor="middle" fill="#92B8DA" font-size="14" font-weight="400">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#F7F9FC"/>

  <!-- Title -->
  <text x="820" y="230" fill="#1A1A2E" font-size="28" font-weight="700">Créer un nouveau mot de passe</text>

  <!-- Subtitle -->
  <text x="820" y="262" fill="#6B7280" font-size="14" font-weight="400">Choisissez un mot de passe sécurisé pour votre compte.</text>

  <!-- Field 1: Nouveau mot de passe -->
  <text x="820" y="310" fill="#374151" font-size="13" font-weight="500">Nouveau mot de passe</text>
  <rect x="820" y="322" width="400" height="46" rx="10" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1" filter="url(#hybShadow)"/>
  <text x="838" y="350" fill="#1A1A2E" font-size="14">••••••••••••</text>
  <!-- Visibility toggle -->
  <circle cx="1196" cy="345" r="10" fill="none" stroke="#9CA3AF" stroke-width="1"/>
  <circle cx="1196" cy="345" r="3" fill="#9CA3AF"/>

  <!-- Password strength indicator -->
  <rect x="820" y="380" width="128" height="5" rx="2.5" fill="#10B981"/>
  <rect x="954" y="380" width="128" height="5" rx="2.5" fill="#10B981"/>
  <rect x="1088" y="380" width="132" height="5" rx="2.5" fill="#10B981"/>
  <text x="1220" y="380" fill="#10B981" font-size="12" font-weight="600" text-anchor="end" dy="-4">Fort</text>

  <!-- Criteria checklist -->
  <circle cx="830" cy="406" r="7" fill="#ECFDF5"/>
  <text x="830" y="410" text-anchor="middle" fill="#10B981" font-size="9" font-weight="700">✓</text>
  <text x="845" y="410" fill="#374151" font-size="12">Au moins 8 caractères</text>

  <circle cx="830" cy="428" r="7" fill="#ECFDF5"/>
  <text x="830" y="432" text-anchor="middle" fill="#10B981" font-size="9" font-weight="700">✓</text>
  <text x="845" y="432" fill="#374151" font-size="12">Au moins 1 majuscule</text>

  <circle cx="830" cy="450" r="7" fill="#ECFDF5"/>
  <text x="830" y="454" text-anchor="middle" fill="#10B981" font-size="9" font-weight="700">✓</text>
  <text x="845" y="454" fill="#374151" font-size="12">Au moins 1 chiffre</text>

  <!-- Field 2: Confirmer le mot de passe -->
  <text x="820" y="494" fill="#374151" font-size="13" font-weight="500">Confirmer le mot de passe</text>
  <rect x="820" y="506" width="400" height="46" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#hybShadow)"/>
  <text x="838" y="534" fill="#1A1A2E" font-size="14">••••••••••••</text>
  <!-- Green check for match -->
  <circle cx="1196" cy="529" r="10" fill="#ECFDF5"/>
  <text x="1196" y="533" text-anchor="middle" fill="#10B981" font-size="12" font-weight="700">✓</text>

  <!-- Submit button -->
  <rect x="820" y="576" width="400" height="48" rx="10" fill="#1E6FC0"/>
  <text x="1020" y="605" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">Modifier mon mot de passe</text>

  <!-- Redirect text -->
  <text x="1020" y="646" text-anchor="middle" fill="#9CA3AF" font-size="13">Vous serez redirigé vers la page de connexion.</text>
</svg>
