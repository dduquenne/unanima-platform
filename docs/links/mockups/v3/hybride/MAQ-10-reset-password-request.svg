<!-- MAQ-10 | Reset Password Request | hybride -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="hybGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0D3B6E"/>
      <stop offset="100%" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="hybShadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <filter id="hybCardShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Left Panel -->
  <rect x="0" y="0" width="600" height="900" fill="url(#hybGrad)"/>

  <!-- Subtle gradient + color spots -->
  <circle cx="120" cy="180" r="100" fill="#1A5BA0" opacity="0.1"/>
  <circle cx="480" cy="720" r="120" fill="#1A5BA0" opacity="0.08"/>
  <circle cx="150" cy="700" r="6" fill="#FF6B35" opacity="0.4"/>
  <circle cx="450" cy="200" r="5" fill="#FF6B35" opacity="0.35"/>
  <circle cx="350" cy="820" r="4" fill="#FF6B35" opacity="0.3"/>
  <rect x="80" y="350" width="40" height="2" rx="1" fill="#FF6B35" opacity="0.25"/>
  <rect x="480" y="550" width="40" height="2" rx="1" fill="#FF6B35" opacity="0.2"/>

  <!-- Logo -->
  <text x="300" y="395" text-anchor="middle" fill="#FFFFFF" font-size="33" font-weight="700">Link's</text>
  <text x="300" y="435" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="300">Accompagnement</text>

  <!-- Orange accent -->
  <rect x="235" y="452" width="130" height="3" rx="1.5" fill="#FF6B35"/>

  <!-- Tagline -->
  <text x="300" y="490" text-anchor="middle" fill="#92B8DA" font-size="14" font-weight="400">Votre parcours de bilan de compétences,</text>
  <text x="300" y="512" text-anchor="middle" fill="#92B8DA" font-size="14" font-weight="400">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#F7F9FC"/>

  <!-- Form container -->
  <!-- Back link -->
  <text x="820" y="280" fill="#1E6FC0" font-size="14" font-weight="500">← Retour à la connexion</text>

  <!-- Title -->
  <text x="820" y="342" fill="#1A1A2E" font-size="28" font-weight="700">Mot de passe oublié ?</text>

  <!-- Subtitle -->
  <text x="820" y="376" fill="#6B7280" font-size="14" font-weight="400">Saisissez votre adresse email. Si elle est associée à un</text>
  <text x="820" y="396" fill="#6B7280" font-size="14" font-weight="400">compte, vous recevrez un lien de réinitialisation.</text>

  <!-- Email field -->
  <text x="820" y="442" fill="#374151" font-size="13" font-weight="500">Adresse email</text>
  <rect x="820" y="454" width="400" height="46" rx="10" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1" filter="url(#hybShadow)"/>
  <text x="838" y="482" fill="#9CA3AF" font-size="14">votre@email.com</text>

  <!-- Submit button -->
  <rect x="820" y="520" width="400" height="48" rx="10" fill="#1E6FC0"/>
  <text x="1020" y="549" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">Envoyer le lien</text>

  <!-- Success state card -->
  <rect x="790" y="604" width="460" height="205" rx="14" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1" filter="url(#hybCardShadow)"/>

  <!-- Green check circle -->
  <circle cx="1020" cy="654" r="26" fill="#ECFDF5"/>
  <circle cx="1020" cy="654" r="17" fill="#10B981"/>
  <text x="1020" y="661" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">✓</text>

  <!-- Success title -->
  <text x="1020" y="703" text-anchor="middle" fill="#065F46" font-size="18" font-weight="700">Email envoyé !</text>

  <!-- Success message -->
  <text x="1020" y="730" text-anchor="middle" fill="#6B7280" font-size="13">Si cette adresse est associée à un compte, vous recevrez</text>
  <text x="1020" y="750" text-anchor="middle" fill="#6B7280" font-size="13">un lien de réinitialisation dans quelques minutes.</text>
  <text x="1020" y="770" text-anchor="middle" fill="#6B7280" font-size="13">Pensez à vérifier vos spams.</text>

  <!-- Return to login link -->
  <text x="1020" y="800" text-anchor="middle" fill="#1E6FC0" font-size="14" font-weight="500">Retour à la connexion</text>
</svg>
