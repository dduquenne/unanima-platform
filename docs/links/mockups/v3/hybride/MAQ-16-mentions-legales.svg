  <text x="148" y="637" class="font" font-size="12" font-weight="700" fill="#1E6FC0">R</text>
  <text x="176" y="637" class="font" font-size="15" font-weight="600" fill="#1A1A2E">Protection des donnees personnelles</text>
  <line x1="148" y1="650" x2="1292" y2="650" stroke="#F0F4F8" stroke-width="1"/>
  <text x="148" y="674" class="font" font-size="12.5" font-weight="400" fill="#6B7280">Conformement au Reglement General sur la Protection des Donnees (RGPD) et a la loi Informatique et Libertes du 6 janvier</text>
  <text x="148" y="694" class="font" font-size="12.5" font-weight="400" fill="#6B7280">1978 modifiee, vous disposez d'un droit d'acces, de rectification, de suppression et de portabilite de vos donnees personnelles,</text>
  <text x="148" y="714" class="font" font-size="12.5" font-weight="400" fill="#6B7280">ainsi que d'un droit d'opposition et de limitation du traitement. Pour exercer ces droits : <tspan fill="#1E6FC0" font-weight="500">dpo@links-accompagnement.fr</tspan></text>

  <!-- Footer -->
  <rect x="0" y="755" width="1440" height="145" fill="#1A1F2E"/>
  <rect x="0" y="755" width="1440" height="2" fill="#FF6B35"/>

  <text x="120" y="794" class="font" font-size="15" font-weight="600" fill="#FFFFFF">Link's Accompagnement</text>
  <text x="120" y="814" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.45)">Plateforme de suivi des bilans de competences</text>

  <text x="600" y="794" class="font" font-size="12" font-weight="500" fill="rgba(255,255,255,0.65)">Pages legales</text>
  <text x="600" y="814" class="font" font-size="12" font-weight="400" fill="#FF6B35">Mentions legales</text>
  <text x="600" y="834" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.45)">Politique de confidentialite</text>
  <text x="600" y="854" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.45)">Gestion des cookies</text>

  <text x="900" y="794" class="font" font-size="12" font-weight="500" fill="rgba(255,255,255,0.65)">Contact</text>
  <text x="900" y="814" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.45)">contact@links-accompagnement.fr</text>
  <text x="900" y="834" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.45)">+33 (0)1 23 45 67 89</text>

  <line x1="120" y1="870" x2="1320" y2="870" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="120" y="890" class="font" font-size="11" font-weight="400" fill="rgba(255,255,255,0.3)">2026 Link's Accompagnement. Tous droits reserves.</text>
