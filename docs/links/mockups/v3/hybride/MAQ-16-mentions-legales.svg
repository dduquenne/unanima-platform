  <text x="808" y="258" class="font" font-size="12.5" font-weight="500" fill="#374151">Qualite</text>
  <text x="960" y="258" class="font" font-size="12.5" font-weight="400" fill="#6B7280">Presidente de Link's Accompagnement</text>
