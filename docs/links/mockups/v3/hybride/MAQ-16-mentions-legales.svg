  <!-- Left Column -->
  <!-- Card 1: Editeur -->
  <rect x="120" y="161" width="640" height="215" rx="12" fill="#FFFFFF" filter="url(#hybridShadow)" stroke="#E8ECF1" stroke-width="1"/>
  <rect x="120" y="161" width="640" height="5" rx="12" fill="#1E6FC0"/>
  <!-- Icon circle -->
  <circle cx="152" cy="192" r="14" fill="#EBF3FC"/>
  <text x="147" y="197" class="font" font-size="12" font-weight="700" fill="#1E6FC0">E</text>
  <text x="176" y="197" class="font" font-size="15" font-weight="600" fill="#1A1A2E">Editeur du site</text>
  <line x1="148" y1="210" x2="732" y2="210" stroke="#F0F4F8" stroke-width="1"/>

  <text x="148" y="234" class="font" font-size="12.5" font-weight="500" fill="#374151">Raison sociale</text>
  <text x="310" y="234" class="font" font-size="12.5" font-weight="400" fill="#6B7280">Link's Accompagnement</text>
  <text x="148" y="258" class="font" font-size="12.5" font-weight="500" fill="#374151">Forme juridique</text>
  <text x="310" y="258" class="font" font-size="12.5" font-weight="400" fill="#6B7280">SAS au capital de 10 000 euros</text>
  <text x="148" y="282" class="font" font-size="12.5" font-weight="500" fill="#374151">SIRET</text>
  <text x="310" y="282" class="font" font-size="12.5" font-weight="400" fill="#6B7280">123 456 789 00012</text>
  <text x="148" y="306" class="font" font-size="12.5" font-weight="500" fill="#374151">Siege social</text>
  <text x="310" y="306" class="font" font-size="12.5" font-weight="400" fill="#6B7280">12 rue de la Paix, 75002 Paris, France</text>
  <text x="148" y="330" class="font" font-size="12.5" font-weight="500" fill="#374151">RCS / TVA</text>
  <text x="310" y="330" class="font" font-size="12.5" font-weight="400" fill="#6B7280">Paris B 123 456 789 / FR 12 123456789</text>
  <text x="148" y="354" class="font" font-size="12.5" font-weight="500" fill="#374151">Telephone</text>
  <text x="310" y="354" class="font" font-size="12.5" font-weight="400" fill="#6B7280">+33 (0)1 23 45 67 89</text>

