  <text x="140" y="105" class="font" font-size="24" font-weight="700" fill="#1A1A2E">Mentions legales</text>
  <text x="140" y="126" class="font" font-size="13" font-weight="400" fill="#6B7280">Informations requises par la loi n 2004-575 du 21 juin 2004</text>

