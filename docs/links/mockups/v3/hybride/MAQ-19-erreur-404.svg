<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap');
      .font { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
    <linearGradient id="hyHeaderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#185EA0"/>
      <stop offset="100%" stop-color="#1E6FC0"/>
    </linearGradient>
    <linearGradient id="hyAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8F5E"/>
    </linearGradient>
    <linearGradient id="hyBtnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E6FC0"/>
      <stop offset="100%" stop-color="#185EA0"/>
    </linearGradient>
    <linearGradient id="hy404Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E6FC0"/>
      <stop offset="100%" stop-color="#1E6FC0" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="hyShadow" x="-5%" y="-5%" width="110%" height="118%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#1E6FC0" flood-opacity="0.1"/>
    </filter>
    <filter id="hyBtnShadow" x="-8%" y="-10%" width="116%" height="135%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E6FC0" flood-opacity="0.2"/>
    </filter>
    <clipPath id="illustClip">
      <rect x="440" y="200" width="560" height="200" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#F7F9FC"/>

  <!-- Subtle background decoration -->
  <!-- Large faded circle -->
  <circle cx="1200" cy="200" r="300" fill="#1E6FC0" opacity="0.015"/>
  <circle cx="250" cy="700" r="250" fill="#FF6B35" opacity="0.015"/>

  <!-- Geometric decorative elements -->
  <!-- Floating diamonds -->
  <rect x="280" y="300" width="16" height="16" rx="2" fill="#1E6FC0" opacity="0.06" transform="rotate(45,288,308)"/>
  <rect x="1140" y="400" width="12" height="12" rx="2" fill="#FF6B35" opacity="0.08" transform="rotate(45,1146,406)"/>
  <circle cx="320" cy="500" r="5" fill="#FF6B35" opacity="0.06"/>
  <circle cx="1120" cy="300" r="7" fill="#1E6FC0" opacity="0.05"/>
  <!-- Dotted arc -->
  <circle cx="720" cy="340" r="120" fill="none" stroke="#DCE1EB" stroke-width="1" stroke-dasharray="4,8" opacity="0.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="1440" height="64" fill="url(#hyHeaderGrad)"/>
  <rect x="0" y="64" width="1440" height="3" fill="url(#hyAccent)"/>

  <!-- Logo -->
  <text x="48" y="40" class="font" fill="#FFFFFF" font-size="22" font-weight="700" letter-spacing="0.5">Link's</text>
  <rect x="122" y="27" width="4" height="18" rx="2" fill="#FF6B35"/>

  <!-- Main card -->
  <rect x="360" y="160" width="720" height="560" rx="14" fill="#FFFFFF" filter="url(#hyShadow)"/>

  <!-- Illustration area — map/path concept -->
  <!-- Winding path -->
  <path d="M 520 280 C 560 240, 620 320, 660 260 S 760 300, 800 260 S 880 320, 920 280" fill="none" stroke="#1E6FC0" stroke-width="2.5" opacity="0.12" stroke-linecap="round"/>
  <!-- Path dots (waypoints) -->
  <circle cx="520" cy="280" r="5" fill="#1E6FC0" opacity="0.15"/>
  <circle cx="660" cy="260" r="5" fill="#1E6FC0" opacity="0.15"/>
  <circle cx="800" cy="260" r="5" fill="#1E6FC0" opacity="0.15"/>
  <!-- End point — X mark (destination not found) -->
  <circle cx="920" cy="280" r="12" fill="#FF6B35" opacity="0.1"/>
  <line x1="912" y1="272" x2="928" y2="288" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="928" y1="272" x2="912" y2="288" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Start pin -->
  <circle cx="520" cy="280" r="8" fill="none" stroke="#1E6FC0" stroke-width="1.5" opacity="0.2"/>
  <circle cx="520" cy="280" r="3" fill="#1E6FC0" opacity="0.3"/>

  <!-- 404 — balanced style -->
  <text x="720" y="450" class="font" fill="url(#hy404Grad)" font-size="130" font-weight="900" text-anchor="middle" letter-spacing="-4" opacity="0.07">404</text>
  <text x="720" y="435" class="font" fill="#1E6FC0" font-size="110" font-weight="900" text-anchor="middle" letter-spacing="-3">4</text>
  <!-- Stylized 0 with compass ring -->
  <circle cx="720" cy="405" r="38" fill="none" stroke="#1E6FC0" stroke-width="5"/>
  <circle cx="720" cy="405" r="28" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>
  <!-- Compass cross inside 0 -->
  <line x1="720" y1="375" x2="720" y2="395" stroke="#1E6FC0" stroke-width="1.5" opacity="0.3"/>
  <line x1="720" y1="415" x2="720" y2="435" stroke="#1E6FC0" stroke-width="1.5" opacity="0.3"/>
  <line x1="690" y1="405" x2="710" y2="405" stroke="#1E6FC0" stroke-width="1.5" opacity="0.3"/>
  <line x1="730" y1="405" x2="750" y2="405" stroke="#1E6FC0" stroke-width="1.5" opacity="0.3"/>
  <circle cx="720" cy="405" r="3" fill="#FF6B35" opacity="0.6"/>
  <text x="808" y="435" class="font" fill="#1E6FC0" font-size="110" font-weight="900" text-anchor="middle" letter-spacing="-3">4</text>

  <!-- Accent bar -->
  <rect x="650" y="460" width="140" height="3" rx="2" fill="url(#hyAccent)"/>

  <!-- Error message -->
  <text x="720" y="510" class="font" fill="#2D3748" font-size="26" font-weight="700" text-anchor="middle">Page introuvable</text>

  <!-- Subtitle -->
  <text x="720" y="545" class="font" fill="#7A889A" font-size="15" font-weight="400" text-anchor="middle">La page que vous recherchez n'existe pas ou a ete deplacee.</text>

  <!-- CTA Button — balanced radius -->
  <rect x="600" y="580" width="240" height="50" rx="12" fill="url(#hyBtnGrad)" filter="url(#hyBtnShadow)"/>
  <!-- Home icon -->
  <path d="M 648 605 L 640 612 L 640 622 L 645 622 L 645 616 L 651 616 L 651 622 L 656 622 L 656 612 Z" fill="none" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <text x="728" y="611" class="font" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Retour a l'accueil</text>

  <!-- Optional secondary link -->
  <text x="720" y="660" class="font" fill="#1E6FC0" font-size="13" font-weight="500" text-anchor="middle" opacity="0.6">Besoin d'aide ?</text>

  <!-- Footer -->
  <line x1="360" y1="840" x2="1080" y2="840" stroke="#E8ECF1" stroke-width="1"/>
  <text x="720" y="870" class="font" fill="#A0AEC0" font-size="13" font-weight="400" text-anchor="middle">Link's Accompagnement — Plateforme de suivi des bilans de competences</text>
</svg>