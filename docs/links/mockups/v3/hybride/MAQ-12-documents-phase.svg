<!-- MAQ-12 | Documents Phase | Link's Accompagnement | v3.0 | hybride | 2026-03-26 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
