<!-- MAQ-10 | Reset Password Request | chaleureux -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D3B6E"/>
      <stop offset="100%" stop-color="#14527A"/>
    </linearGradient>
    <filter id="softShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-opacity="0.1"/>
    </filter>
    <clipPath id="blobClip">
      <ellipse cx="300" cy="450" rx="260" ry="380"/>
    </clipPath>
  </defs>

  <!-- Left Panel -->
  <rect x="0" y="0" width="600" height="900" fill="url(#warmGrad)"/>

  <!-- Organic blob shapes -->
  <ellipse cx="150" cy="200" rx="140" ry="100" fill="#1A5BA0" opacity="0.15" transform="rotate(-15 150 200)"/>
  <ellipse cx="450" cy="700" rx="160" ry="120" fill="#1A5BA0" opacity="0.12" transform="rotate(20 450 700)"/>
  <ellipse cx="80" cy="600" rx="100" ry="70" fill="#F28C5A" opacity="0.08" transform="rotate(-10 80 600)"/>
  <ellipse cx="500" cy="250" rx="80" ry="60" fill="#F28C5A" opacity="0.06" transform="rotate(15 500 250)"/>
  <circle cx="350" cy="150" r="6" fill="#F28C5A" opacity="0.35"/>
  <circle cx="180" cy="750" r="5" fill="#F28C5A" opacity="0.3"/>
  <circle cx="500" cy="450" r="4" fill="#F28C5A" opacity="0.25"/>

  <!-- Logo -->
  <text x="300" y="390" text-anchor="middle" fill="#FFFFFF" font-size="34" font-weight="700">Link's</text>
  <text x="300" y="432" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="300">Accompagnement</text>

  <!-- Orange accent -->
  <rect x="230" y="452" width="140" height="4" rx="2" fill="#F28C5A"/>

  <!-- Tagline -->
  <text x="300" y="492" text-anchor="middle" fill="#A8C8E8" font-size="15" font-weight="400">Votre parcours de bilan de compétences,</text>
  <text x="300" y="516" text-anchor="middle" fill="#A8C8E8" font-size="15" font-weight="400">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#FFF8F5"/>

  <!-- Form container -->
  <!-- Back link -->
  <text x="820" y="275" fill="#2A7FD4" font-size="14" font-weight="500">← Retour à la connexion</text>

  <!-- Title -->
  <text x="820" y="340" fill="#1A1A2E" font-size="30" font-weight="700">Mot de passe oublié ?</text>

  <!-- Subtitle - warm and encouraging -->
  <text x="820" y="378" fill="#6B7280" font-size="15" font-weight="400">Pas de souci ! Saisissez votre adresse email.</text>
  <text x="820" y="400" fill="#6B7280" font-size="15" font-weight="400">Si elle est associée à un compte, vous recevrez</text>
  <text x="820" y="422" fill="#6B7280" font-size="15" font-weight="400">un lien de réinitialisation.</text>

  <!-- Email field -->
  <text x="820" y="468" fill="#374151" font-size="14" font-weight="500">Adresse email</text>
  <rect x="820" y="480" width="400" height="48" rx="16" fill="#FFFFFF" stroke="#E8D5CC" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="840" y="510" fill="#9CA3AF" font-size="14">votre@email.com</text>

  <!-- Submit button -->
  <rect x="820" y="550" width="400" height="50" rx="16" fill="#2A7FD4"/>
  <text x="1020" y="580" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="600">Envoyer le lien</text>

  <!-- Success state card -->
  <rect x="785" y="635" width="470" height="215" rx="20" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="1.5" filter="url(#cardShadow)"/>

  <!-- Green check circle - larger -->
  <circle cx="1020" cy="690" r="28" fill="#ECFDF5"/>
  <circle cx="1020" cy="690" r="18" fill="#10B981"/>
  <text x="1020" y="697" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700">✓</text>

  <!-- Success title -->
  <text x="1020" y="742" text-anchor="middle" fill="#065F46" font-size="20" font-weight="700">Email envoyé !</text>

  <!-- Success message -->
  <text x="1020" y="770" text-anchor="middle" fill="#6B7280" font-size="13">Si cette adresse est associée à un compte, vous recevrez</text>
  <text x="1020" y="790" text-anchor="middle" fill="#6B7280" font-size="13">un lien de réinitialisation dans quelques minutes.</text>
  <text x="1020" y="810" text-anchor="middle" fill="#6B7280" font-size="13">Pensez à vérifier vos spams.</text>

  <!-- Return to login link -->
  <text x="1020" y="840" text-anchor="middle" fill="#2A7FD4" font-size="14" font-weight="600">Retour à la connexion</text>
</svg>
