<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .font { font-family: 'Inter', Arial, sans-serif; }
      .shadow { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.06)); }
      .shadow-md { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1)); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#FFF8F5"/>

  <!-- Header -->
  <rect width="1440" height="68" rx="0" fill="#2A7FD4"/>
  <rect x="0" y="64" width="1440" height="4" rx="0" fill="#F28C5A"/>
  <text x="80" y="42" class="font" fill="#FFFFFF" font-size="24" font-weight="700">Link's</text>
  <text x="153" y="42" class="font" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="400">Accompagnement</text>

  <!-- Nav -->
  <text x="1030" y="40" class="font" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="500">Accueil</text>
  <text x="1120" y="40" class="font" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="500">Contact</text>
  <text x="1210" y="40" class="font" fill="#FFFFFF" font-size="13" font-weight="600">Connexion</text>

  <!-- Hero area -->
  <rect x="0" y="68" width="1440" height="120" fill="#FFF0E8"/>
  <!-- Cookie illustration -->
  <circle cx="720" cy="100" r="28" fill="#FDE8D8" stroke="#F28C5A" stroke-width="2"/>
  <circle cx="712" cy="93" r="3" fill="#F28C5A"/>
  <circle cx="726" cy="90" r="2.5" fill="#F28C5A"/>
  <circle cx="715" cy="107" r="3" fill="#F28C5A"/>
  <circle cx="730" cy="104" r="2.5" fill="#F28C5A"/>
  <text x="720" y="150" class="font" fill="#2A2A3E" font-size="28" font-weight="700" text-anchor="middle">Gestion des cookies</text>
  <text x="720" y="175" class="font" fill="#7A7A8E" font-size="15" font-weight="400" text-anchor="middle">Personnalisez votre expérience en gérant vos préférences de cookies</text>

  <!-- Info box -->
  <rect x="240" y="205" width="960" height="52" rx="18" fill="#FFFFFF" stroke="#E8D4C8" stroke-width="1" class="shadow"/>
  <text x="270" y="225" class="font" fill="#F28C5A" font-size="16" font-weight="700">&#x1F36A;</text>
  <text x="296" y="228" class="font" fill="#5A4A3E" font-size="13" font-weight="400">Les cookies sont de petits fichiers qui améliorent votre navigation. Vous pouvez choisir ceux que vous acceptez.</text>
  <text x="296" y="246" class="font" fill="#8A7A6E" font-size="12" font-weight="400">Les cookies essentiels restent toujours actifs pour le bon fonctionnement du site.</text>

  <!-- Card 1: Essential -->
  <rect x="240" y="275" width="960" height="116" rx="18" fill="#FFFFFF" stroke="#E8D4C8" stroke-width="1" class="shadow"/>
  <!-- Warm left accent -->
  <rect x="240" y="275" width="8" height="116" rx="4" fill="#2A7FD4"/>
  <!-- Warm toggle ON locked -->
  <rect x="1120" y="310" width="52" height="28" rx="14" fill="#2A7FD4"/>
  <circle cx="1158" cy="324" r="11" fill="#FFFFFF" class="shadow"/>
  <!-- Lock icon indicator -->
  <rect x="1068" y="344" width="90" height="24" rx="12" fill="#EBF4FF"/>
  <text x="1113" y="360" class="font" fill="#2A7FD4" font-size="11" font-weight="600" text-anchor="middle">Toujours actif</text>
  <text x="272" y="310" class="font" fill="#2A2A3E" font-size="18" font-weight="600">Cookies essentiels</text>
  <text x="272" y="334" class="font" fill="#7A7A8E" font-size="13" font-weight="400">Indispensables au fonctionnement du site : navigation sécurisée, authentification,</text>
  <text x="272" y="352" class="font" fill="#7A7A8E" font-size="13" font-weight="400">protection de vos données personnelles. Ces cookies ne peuvent pas être désactivés.</text>
  <text x="272" y="378" class="font" fill="#B0A090" font-size="11" font-weight="400">3 cookies utilisés • Link's Accompagnement, Supabase</text>

  <!-- Card 2: Analytics -->
  <rect x="240" y="406" width="960" height="116" rx="18" fill="#FFFFFF" stroke="#E8D4C8" stroke-width="1" class="shadow"/>
  <rect x="240" y="406" width="8" height="116" rx="4" fill="#F28C5A"/>
  <!-- Toggle OFF warm style -->
  <rect x="1120" y="441" width="52" height="28" rx="14" fill="#DDD0C8"/>
  <circle cx="1134" cy="455" r="11" fill="#FFFFFF" class="shadow"/>
  <text x="272" y="441" class="font" fill="#2A2A3E" font-size="18" font-weight="600">Cookies analytiques</text>
  <text x="272" y="465" class="font" fill="#7A7A8E" font-size="13" font-weight="400">Nous aident à comprendre votre utilisation du site de manière anonyme,</text>
  <text x="272" y="483" class="font" fill="#7A7A8E" font-size="13" font-weight="400">afin d'améliorer continuellement nos services et votre expérience.</text>
  <text x="272" y="509" class="font" fill="#B0A090" font-size="11" font-weight="400">2 cookies utilisés • Vercel Analytics</text>

  <!-- Card 3: Preferences -->
  <rect x="240" y="537" width="960" height="116" rx="18" fill="#FFFFFF" stroke="#E8D4C8" stroke-width="1" class="shadow"/>
  <rect x="240" y="537" width="8" height="116" rx="4" fill="#4CAF82"/>
  <!-- Toggle ON -->
  <rect x="1120" y="572" width="52" height="28" rx="14" fill="#2A7FD4"/>
  <circle cx="1158" cy="586" r="11" fill="#FFFFFF" class="shadow"/>
  <text x="272" y="572" class="font" fill="#2A2A3E" font-size="18" font-weight="600">Cookies de préférences</text>
  <text x="272" y="596" class="font" fill="#7A7A8E" font-size="13" font-weight="400">Mémorisent vos choix d'affichage, de langue et de navigation pour vous offrir</text>
  <text x="272" y="614" class="font" fill="#7A7A8E" font-size="13" font-weight="400">une expérience plus confortable et personnalisée à chaque visite.</text>
  <text x="272" y="640" class="font" fill="#B0A090" font-size="11" font-weight="400">2 cookies utilisés • Link's Accompagnement</text>

  <!-- Action Buttons -->
  <rect x="240" y="670" width="960" height="60" rx="18" fill="#FFFFFF" stroke="#E8D4C8" stroke-width="1" class="shadow"/>
  <rect x="850" y="683" width="180" height="38" rx="19" fill="#2A7FD4" class="shadow-md"/>
  <text x="940" y="707" class="font" fill="#FFFFFF" font-size="14" font-weight="600" text-anchor="middle">Enregistrer mes choix</text>
  <rect x="1040" y="683" width="140" height="38" rx="19" fill="#FFF0E8" stroke="#F28C5A" stroke-width="1.5"/>
  <text x="1110" y="707" class="font" fill="#F28C5A" font-size="14" font-weight="600" text-anchor="middle">Tout accepter</text>
  <rect x="260" y="683" width="130" height="38" rx="19" fill="#FFFFFF" stroke="#DDD0C8" stroke-width="1"/>
  <text x="325" y="707" class="font" fill="#8A7A6E" font-size="14" font-weight="500" text-anchor="middle">Tout refuser</text>

  <!-- Detail Table -->
  <text x="240" y="764" class="font" fill="#2A2A3E" font-size="18" font-weight="600">Détail des cookies utilisés</text>

  <!-- Table Header -->
  <rect x="240" y="776" width="960" height="34" rx="16" fill="#FFF0E8"/>
  <text x="270" y="798" class="font" fill="#5A4A3E" font-size="12" font-weight="600">Nom</text>
  <text x="450" y="798" class="font" fill="#5A4A3E" font-size="12" font-weight="600">Finalité</text>
  <text x="770" y="798" class="font" fill="#5A4A3E" font-size="12" font-weight="600">Durée</text>
  <text x="890" y="798" class="font" fill="#5A4A3E" font-size="12" font-weight="600">Fournisseur</text>
  <text x="1070" y="798" class="font" fill="#5A4A3E" font-size="12" font-weight="600">Catégorie</text>

  <!-- Row 1 -->
  <rect x="240" y="810" width="960" height="30" fill="#FFFFFF"/>
  <line x1="240" y1="840" x2="1200" y2="840" stroke="#F0E4DA" stroke-width="1"/>
  <text x="270" y="830" class="font" fill="#3A3A4E" font-size="12" font-weight="500">sb-auth-token</text>
  <text x="450" y="830" class="font" fill="#7A7A8E" font-size="12">Authentification et session</text>
  <text x="770" y="830" class="font" fill="#7A7A8E" font-size="12">Session</text>
  <text x="890" y="830" class="font" fill="#7A7A8E" font-size="12">Supabase</text>
  <rect x="1060" y="818" width="76" height="22" rx="11" fill="#EBF4FF"/>
  <text x="1098" y="833" class="font" fill="#2A7FD4" font-size="11" font-weight="500" text-anchor="middle">Essentiel</text>

  <!-- Row 2 -->
  <rect x="240" y="840" width="960" height="30" fill="#FFFAF7"/>
  <line x1="240" y1="870" x2="1200" y2="870" stroke="#F0E4DA" stroke-width="1"/>
  <text x="270" y="860" class="font" fill="#3A3A4E" font-size="12" font-weight="500">cookie_consent</text>
  <text x="450" y="860" class="font" fill="#7A7A8E" font-size="12">Préférences cookies</text>
  <text x="770" y="860" class="font" fill="#7A7A8E" font-size="12">13 mois</text>
  <text x="890" y="860" class="font" fill="#7A7A8E" font-size="12">Link's</text>
  <rect x="1060" y="848" width="76" height="22" rx="11" fill="#EBF4FF"/>
  <text x="1098" y="863" class="font" fill="#2A7FD4" font-size="11" font-weight="500" text-anchor="middle">Essentiel</text>

  <!-- Row 3 -->
  <rect x="240" y="870" width="960" height="30" fill="#FFFFFF"/>
  <text x="270" y="890" class="font" fill="#3A3A4E" font-size="12" font-weight="500">_va</text>
  <text x="450" y="890" class="font" fill="#7A7A8E" font-size="12">Mesure d'audience anonyme</text>
  <text x="770" y="890" class="font" fill="#7A7A8E" font-size="12">24 heures</text>
  <text x="890" y="890" class="font" fill="#7A7A8E" font-size="12">Vercel</text>
  <rect x="1060" y="878" width="76" height="22" rx="11" fill="#FFF0E8"/>
  <text x="1098" y="893" class="font" fill="#F28C5A" font-size="11" font-weight="500" text-anchor="middle">Analytique</text>
</svg>