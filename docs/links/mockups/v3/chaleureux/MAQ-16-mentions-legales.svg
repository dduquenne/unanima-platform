<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .font { font-family: 'Inter', Arial, Helvetica, sans-serif; }
    </style>
    <filter id="warmShadow" x="-3%" y="-3%" width="106%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#D4A08A" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A7FD4"/>
      <stop offset="100%" stop-color="#1B6BBF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#FFF8F5"/>

  <!-- Header Bar -->
  <rect width="1440" height="60" rx="0" fill="url(#headerGrad)"/>
  <rect x="0" y="58" width="1440" height="3" fill="#F28C5A" rx="1.5"/>

  <!-- Logo -->
  <text x="80" y="38" class="font" font-size="23" font-weight="700" fill="#FFFFFF">Link's</text>
  <circle cx="150" cy="30" r="5" fill="#F28C5A"/>
  <text x="164" y="38" class="font" font-size="14" font-weight="400" fill="rgba(255,255,255,0.9)">Accompagnement</text>

