  <text x="768" y="484" class="font" font-size="13" font-weight="400" fill="#8B7E76">L'ensemble du contenu de ce site (textes, images, logos,</text>
  <text x="768" y="504" class="font" font-size="13" font-weight="400" fill="#8B7E76">graphismes, icones, sons, logiciels) est la propriete exclusive</text>
  <text x="768" y="524" class="font" font-size="13" font-weight="400" fill="#8B7E76">de Link's Accompagnement ou de ses partenaires et est protege</text>
  <text x="768" y="544" class="font" font-size="13" font-weight="400" fill="#8B7E76">par les lois francaises et internationales relatives a la</text>
  <text x="768" y="564" class="font" font-size="13" font-weight="400" fill="#8B7E76">propriete intellectuelle.</text>

  <!-- Card 5: Protection des donnees -->
