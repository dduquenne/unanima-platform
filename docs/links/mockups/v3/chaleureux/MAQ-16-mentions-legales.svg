  <text x="310" y="532" class="font" font-size="13" font-weight="400" fill="#2A7FD4">https://vercel.com</text>
  <text x="128" y="556" class="font" font-size="13" font-weight="500" fill="#4A4040">Contact</text>
  <text x="310" y="556" class="font" font-size="13" font-weight="400" fill="#2A7FD4">privacy@vercel.com</text>

  <!-- Card 4: Propriete intellectuelle -->
  <rect x="740" y="410" width="600" height="190" rx="18" fill="#FFFFFF" filter="url(#warmShadow)"/>
  <circle cx="772" cy="440" r="16" fill="rgba(242,140,90,0.12)"/>
  <text x="769" y="446" class="font" font-size="14" font-weight="700" fill="#F28C5A">P</text>
  <text x="798" y="445" class="font" font-size="17" font-weight="600" fill="#2C2C3A">Propriete intellectuelle</text>
