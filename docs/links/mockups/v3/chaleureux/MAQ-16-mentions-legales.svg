  <rect x="1215" y="17" width="80" height="28" rx="14" fill="rgba(255,255,255,0.12)"/>
  <text x="1230" y="36" class="font" font-size="13" font-weight="500" fill="#FFFFFF">Contact</text>
  <rect x="1310" y="17" width="100" height="28" rx="14" fill="#F28C5A"/>
  <text x="1330" y="36" class="font" font-size="13" font-weight="600" fill="#FFFFFF">Connexion</text>

  <!-- Page Title Area -->
  <rect x="0" y="60" width="1440" height="90" fill="#FFF0E8"/>
  <!-- Decorative circles -->
  <circle cx="1350" cy="85" r="30" fill="rgba(242,140,90,0.08)"/>
  <circle cx="1380" cy="105" r="20" fill="rgba(42,127,212,0.06)"/>
  <text x="120" y="110" class="font" font-size="26" font-weight="700" fill="#2C2C3A">Mentions legales</text>
  <text x="120" y="134" class="font" font-size="13" font-weight="400" fill="#8B7E76">Informations legales conformement a la loi n 2004-575 du 21 juin 2004</text>

  <!-- Main Content Area -->
  <!-- Card 1: Editeur du site -->
  <rect x="100" y="170" width="620" height="220" rx="18" fill="#FFFFFF" filter="url(#warmShadow)"/>
  <circle cx="132" cy="200" r="16" fill="rgba(42,127,212,0.1)"/>
  <text x="127" y="206" class="font" font-size="14" font-weight="700" fill="#2A7FD4">E</text>
  <text x="158" y="205" class="font" font-size="17" font-weight="600" fill="#2C2C3A">Editeur du site</text>
  <line x1="128" y1="218" x2="692" y2="218" stroke="#F5E6DD" stroke-width="1"/>
  <text x="128" y="244" class="font" font-size="13" font-weight="500" fill="#4A4040">Raison sociale</text>
  <text x="310" y="244" class="font" font-size="13" font-weight="400" fill="#8B7E76">Link's Accompagnement</text>
  <text x="128" y="268" class="font" font-size="13" font-weight="500" fill="#4A4040">Forme juridique</text>
  <text x="310" y="268" class="font" font-size="13" font-weight="400" fill="#8B7E76">SAS au capital de 10 000 euros</text>
  <text x="128" y="292" class="font" font-size="13" font-weight="500" fill="#4A4040">SIRET</text>
  <text x="310" y="292" class="font" font-size="13" font-weight="400" fill="#8B7E76">123 456 789 00012</text>
  <text x="128" y="316" class="font" font-size="13" font-weight="500" fill="#4A4040">Siege social</text>
  <text x="310" y="316" class="font" font-size="13" font-weight="400" fill="#8B7E76">12 rue de la Paix, 75002 Paris, France</text>
  <text x="128" y="340" class="font" font-size="13" font-weight="500" fill="#4A4040">RCS</text>
  <text x="310" y="340" class="font" font-size="13" font-weight="400" fill="#8B7E76">Paris B 123 456 789</text>
  <text x="128" y="364" class="font" font-size="13" font-weight="500" fill="#4A4040">N TVA</text>
  <text x="310" y="364" class="font" font-size="13" font-weight="400" fill="#8B7E76">FR 12 123456789</text>

  <!-- Card 2: Directeur de la publication -->
  <rect x="740" y="170" width="600" height="220" rx="18" fill="#FFFFFF" filter="url(#warmShadow)"/>
  <circle cx="772" cy="200" r="16" fill="rgba(242,140,90,0.12)"/>
  <text x="767" y="206" class="font" font-size="14" font-weight="700" fill="#F28C5A">D</text>
  <text x="798" y="205" class="font" font-size="17" font-weight="600" fill="#2C2C3A">Directeur de la publication</text>
  <line x1="768" y1="218" x2="1312" y2="218" stroke="#F5E6DD" stroke-width="1"/>
  <text x="768" y="244" class="font" font-size="13" font-weight="500" fill="#4A4040">Nom</text>
  <text x="940" y="244" class="font" font-size="13" font-weight="400" fill="#8B7E76">Mme Sophie Martin</text>
  <text x="768" y="268" class="font" font-size="13" font-weight="500" fill="#4A4040">Qualite</text>
  <text x="940" y="268" class="font" font-size="13" font-weight="400" fill="#8B7E76">Presidente de Link's Accompagnement</text>
  <text x="768" y="292" class="font" font-size="13" font-weight="500" fill="#4A4040">E-mail</text>
  <text x="940" y="292" class="font" font-size="13" font-weight="400" fill="#2A7FD4">contact@links-accompagnement.fr</text>
  <text x="768" y="316" class="font" font-size="13" font-weight="500" fill="#4A4040">Telephone</text>
  <text x="940" y="316" class="font" font-size="13" font-weight="400" fill="#8B7E76">+33 (0)1 23 45 67 89</text>

