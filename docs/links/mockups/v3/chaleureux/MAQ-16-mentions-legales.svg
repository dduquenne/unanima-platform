  <text x="128" y="484" class="font" font-size="13" font-weight="500" fill="#4A4040">Hebergeur</text>
  <text x="310" y="484" class="font" font-size="13" font-weight="400" fill="#8B7E76">Vercel Inc.</text>
  <text x="128" y="508" class="font" font-size="13" font-weight="500" fill="#4A4040">Adresse</text>
  <text x="310" y="508" class="font" font-size="13" font-weight="400" fill="#8B7E76">340 S Lemon Ave #4133, Walnut, CA 91789, USA</text>
