  <circle cx="132" cy="650" r="16" fill="rgba(42,127,212,0.1)"/>
  <text x="128" y="656" class="font" font-size="14" font-weight="700" fill="#2A7FD4">R</text>
  <text x="158" y="655" class="font" font-size="17" font-weight="600" fill="#2C2C3A">Protection des donnees personnelles</text>
  <line x1="128" y1="668" x2="1312" y2="668" stroke="#F5E6DD" stroke-width="1"/>
  <text x="128" y="692" class="font" font-size="13" font-weight="400" fill="#8B7E76">Conformement au Reglement General sur la Protection des Donnees (RGPD) et a la loi Informatique et Libertes du 6 janvier</text>
  <text x="128" y="712" class="font" font-size="13" font-weight="400" fill="#8B7E76">1978 modifiee, vous disposez d'un droit d'acces, de rectification, de suppression et de portabilite de vos donnees</text>
  <text x="128" y="732" class="font" font-size="13" font-weight="400" fill="#8B7E76">personnelles. Pour exercer ces droits, contactez : <tspan fill="#2A7FD4" font-weight="500">dpo@links-accompagnement.fr</tspan></text>

  <!-- Footer -->
  <rect x="0" y="770" width="1440" height="130" fill="#2C2C3A" rx="0"/>
  <!-- Warm accent line -->
  <rect x="0" y="770" width="1440" height="3" fill="#F28C5A"/>

  <text x="120" y="806" class="font" font-size="15" font-weight="600" fill="#FFFFFF">Link's Accompagnement</text>
  <text x="120" y="826" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">Plateforme de suivi des bilans de competences</text>

  <text x="600" y="806" class="font" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">Pages legales</text>
  <text x="600" y="826" class="font" font-size="12" font-weight="400" fill="#F28C5A">Mentions legales</text>
  <text x="600" y="846" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">Politique de confidentialite</text>
  <text x="600" y="866" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">Gestion des cookies</text>

  <text x="900" y="806" class="font" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">Contact</text>
  <text x="900" y="826" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">contact@links-accompagnement.fr</text>
  <text x="900" y="846" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">+33 (0)1 23 45 67 89</text>

  <line x1="120" y1="878" x2="1320" y2="878" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="120" y="896" class="font" font-size="11" font-weight="400" fill="rgba(255,255,255,0.3)">2026 Link's Accompagnement. Tous droits reserves.</text>
</svg>