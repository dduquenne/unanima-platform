  <circle cx="132" cy="440" r="16" fill="rgba(42,127,212,0.1)"/>
  <text x="127" y="446" class="font" font-size="14" font-weight="700" fill="#2A7FD4">H</text>
  <text x="158" y="445" class="font" font-size="17" font-weight="600" fill="#2C2C3A">Hebergement</text>
