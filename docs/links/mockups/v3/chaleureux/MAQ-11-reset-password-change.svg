<!-- MAQ-11 | Reset Password Change | chaleureux -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D3B6E"/>
      <stop offset="100%" stop-color="#14527A"/>
    </linearGradient>
    <filter id="softShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Left Panel -->
  <rect x="0" y="0" width="600" height="900" fill="url(#warmGrad)"/>

  <!-- Organic blob shapes -->
  <ellipse cx="150" cy="200" rx="140" ry="100" fill="#1A5BA0" opacity="0.15" transform="rotate(-15 150 200)"/>
  <ellipse cx="450" cy="700" rx="160" ry="120" fill="#1A5BA0" opacity="0.12" transform="rotate(20 450 700)"/>
  <ellipse cx="80" cy="600" rx="100" ry="70" fill="#F28C5A" opacity="0.08" transform="rotate(-10 80 600)"/>
  <ellipse cx="500" cy="250" rx="80" ry="60" fill="#F28C5A" opacity="0.06" transform="rotate(15 500 250)"/>
  <circle cx="350" cy="150" r="6" fill="#F28C5A" opacity="0.35"/>
  <circle cx="180" cy="750" r="5" fill="#F28C5A" opacity="0.3"/>

  <!-- Logo -->
  <text x="300" y="390" text-anchor="middle" fill="#FFFFFF" font-size="34" font-weight="700">Link's</text>
  <text x="300" y="432" text-anchor="middle" fill="#FFFFFF" font-size="23" font-weight="300">Accompagnement</text>
  <rect x="230" y="452" width="140" height="4" rx="2" fill="#F28C5A"/>
  <text x="300" y="492" text-anchor="middle" fill="#A8C8E8" font-size="15" font-weight="400">Votre parcours de bilan de compétences,</text>
  <text x="300" y="516" text-anchor="middle" fill="#A8C8E8" font-size="15" font-weight="400">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#FFF8F5"/>

  <!-- Title -->
  <text x="820" y="225" fill="#1A1A2E" font-size="30" font-weight="700">Créer un nouveau mot de passe</text>

  <!-- Subtitle - warm -->
  <text x="820" y="260" fill="#6B7280" font-size="15" font-weight="400">Choisissez un mot de passe sécurisé pour votre compte.</text>

  <!-- Field 1: Nouveau mot de passe -->
  <text x="820" y="310" fill="#374151" font-size="14" font-weight="500">Nouveau mot de passe</text>
  <rect x="820" y="322" width="400" height="48" rx="16" fill="#FFFFFF" stroke="#E8D5CC" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="840" y="352" fill="#1A1A2E" font-size="14">••••••••••••</text>
  <!-- Visibility toggle -->
  <circle cx="1196" cy="346" r="11" fill="none" stroke="#9CA3AF" stroke-width="1"/>
  <circle cx="1196" cy="346" r="3.5" fill="#9CA3AF"/>

  <!-- Password strength indicator - larger for chaleureux -->
  <rect x="820" y="384" width="128" height="6" rx="3" fill="#10B981"/>
  <rect x="954" y="384" width="128" height="6" rx="3" fill="#10B981"/>
  <rect x="1088" y="384" width="132" height="6" rx="3" fill="#10B981"/>
  <text x="1220" y="383" fill="#10B981" font-size="13" font-weight="600" text-anchor="end" dy="-4">Fort</text>

  <!-- Criteria checklist -->
  <circle cx="832" cy="412" r="8" fill="#ECFDF5"/>
  <text x="832" y="416" text-anchor="middle" fill="#10B981" font-size="10" font-weight="700">✓</text>
  <text x="848" y="416" fill="#374151" font-size="13">Au moins 8 caractères</text>

  <circle cx="832" cy="436" r="8" fill="#ECFDF5"/>
  <text x="832" y="440" text-anchor="middle" fill="#10B981" font-size="10" font-weight="700">✓</text>
  <text x="848" y="440" fill="#374151" font-size="13">Au moins 1 majuscule</text>

  <circle cx="832" cy="460" r="8" fill="#ECFDF5"/>
  <text x="832" y="464" text-anchor="middle" fill="#10B981" font-size="10" font-weight="700">✓</text>
  <text x="848" y="464" fill="#374151" font-size="13">Au moins 1 chiffre</text>

  <!-- Field 2: Confirmer le mot de passe -->
  <text x="820" y="506" fill="#374151" font-size="14" font-weight="500">Confirmer le mot de passe</text>
  <rect x="820" y="518" width="400" height="48" rx="16" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="840" y="548" fill="#1A1A2E" font-size="14">••••••••••••</text>
  <!-- Green check for match -->
  <circle cx="1196" cy="542" r="11" fill="#ECFDF5"/>
  <text x="1196" y="546" text-anchor="middle" fill="#10B981" font-size="13" font-weight="700">✓</text>

  <!-- Submit button -->
  <rect x="820" y="592" width="400" height="50" rx="16" fill="#2A7FD4"/>
  <text x="1020" y="622" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="600">Modifier mon mot de passe</text>

  <!-- Redirect text -->
  <text x="1020" y="664" text-anchor="middle" fill="#9CA3AF" font-size="13">Vous serez redirigé vers la page de connexion.</text>
</svg>
