<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#FFF8F5"/>

  <!-- Sidebar -->
  <rect width="220" height="900" fill="#0D3B6E" rx="0"/>
  <text x="110" y="38" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="700">Link's</text>
  <text x="110" y="56" text-anchor="middle" fill="#B0C8E8" font-size="11">Accompagnement</text>
  <polygon points="95,62 115,62 105,74" fill="#F28C5A"/>
  <line x1="20" y1="85" x2="200" y2="85" stroke="#1A4F8A" stroke-width="1"/>

  <!-- Nav items -->
  <text x="48" y="125" fill="#7BA5D4" font-size="13" font-weight="500">Dashboard</text>
  <text x="48" y="169" fill="#7BA5D4" font-size="13" font-weight="500">Mon bilan</text>
  <text x="48" y="213" fill="#7BA5D4" font-size="13" font-weight="500">Documents</text>
  <!-- Profil (active) -->
  <rect x="12" y="232" width="196" height="40" rx="16" fill="rgba(255,255,255,0.12)"/>
  <rect x="12" y="232" width="4" height="40" rx="2" fill="#F28C5A"/>
  <text x="48" y="257" fill="#FFFFFF" font-size="13" font-weight="600">Profil</text>

  <!-- Header -->
  <rect x="220" y="0" width="1220" height="64" fill="#FFFFFF" filter="url(#shadow1)"/>
  <text x="252" y="37" fill="#6B7280" font-size="13">Profil</text>
  <circle cx="1310" cy="32" r="16" fill="#2A7FD4"/>
  <text x="1310" y="37" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="600">MD</text>
  <text x="1335" y="28" fill="#1F2937" font-size="13" font-weight="500">Marie Dupont</text>
  <text x="1335" y="43" fill="#6B7280" font-size="11">Bénéficiaire</text>

  <!-- Profile Card -->
  <rect x="490" y="88" width="720" height="330" rx="20" fill="#FFFFFF" filter="url(#shadow2)"/>

  <!-- Warm decorative strip -->
  <rect x="490" y="88" width="720" height="6" rx="3" fill="url(#warmGrad)"/>
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2A7FD4"/>
      <stop offset="100%" stop-color="#F28C5A"/>
    </linearGradient>
  </defs>

  <!-- Avatar -->
  <circle cx="850" cy="150" r="42" fill="#2A7FD4"/>
  <circle cx="850" cy="150" r="44" fill="none" stroke="#F28C5A" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="850" y="160" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">MD</text>

  <!-- Name -->
  <text x="850" y="218" text-anchor="middle" fill="#1F2937" font-size="24" font-weight="700">Marie Dupont</text>

  <!-- Role badge -->
  <rect x="796" y="228" width="108" height="28" rx="14" fill="#EBF4FF"/>
  <text x="850" y="246" text-anchor="middle" fill="#2A7FD4" font-size="12" font-weight="600">Bénéficiaire</text>

  <!-- Info rows with warm icons -->
  <circle cx="570" cy="278" r="12" fill="#FFF0E8"/>
  <text x="570" y="283" text-anchor="middle" fill="#F28C5A" font-size="12">&#x2709;</text>
  <text x="592" y="283" fill="#4B5563" font-size="13">marie.dupont@email.com</text>

  <circle cx="570" cy="306" r="12" fill="#FFF0E8"/>
  <text x="570" y="311" text-anchor="middle" fill="#F28C5A" font-size="12">&#x260E;</text>
  <text x="592" y="311" fill="#4B5563" font-size="13">06 12 34 56 78</text>

  <circle cx="570" cy="334" r="12" fill="#FFF0E8"/>
  <text x="570" y="339" text-anchor="middle" fill="#F28C5A" font-size="12">&#x1F4C5;</text>
  <text x="592" y="339" fill="#4B5563" font-size="13">Membre depuis le 15 mars 2026</text>

  <circle cx="570" cy="362" r="12" fill="#FFF0E8"/>
  <text x="570" y="367" text-anchor="middle" fill="#F28C5A" font-size="12">&#x1F464;</text>
  <text x="592" y="367" fill="#4B5563" font-size="13">Consultante assignée : </text>
  <text x="752" y="367" fill="#2A7FD4" font-size="13" font-weight="600">Sophie Martin</text>

  <!-- Section: Informations personnelles -->
  <rect x="490" y="436" width="720" height="175" rx="20" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="524" y="468" fill="#1F2937" font-size="16" font-weight="600">Informations personnelles</text>
  <line x1="524" y1="482" x2="1176" y2="482" stroke="#F5E6DC" stroke-width="1"/>

  <text x="524" y="508" fill="#6B7280" font-size="12" font-weight="500">Nom</text>
  <rect x="524" y="514" width="200" height="38" rx="16" fill="#FFF8F5" stroke="#F5E6DC" stroke-width="1"/>
  <text x="542" y="538" fill="#374151" font-size="13">Dupont</text>

  <text x="744" y="508" fill="#6B7280" font-size="12" font-weight="500">Prénom</text>
  <rect x="744" y="514" width="200" height="38" rx="16" fill="#FFF8F5" stroke="#F5E6DC" stroke-width="1"/>
  <text x="762" y="538" fill="#374151" font-size="13">Marie</text>

  <text x="964" y="508" fill="#6B7280" font-size="12" font-weight="500">Email</text>
  <rect x="964" y="514" width="200" height="38" rx="16" fill="#FFF8F5" stroke="#F5E6DC" stroke-width="1"/>
  <text x="982" y="538" fill="#374151" font-size="12">marie.dupont@email.com</text>

  <text x="524" y="575" fill="#9CA3AF" font-size="11" font-style="italic">Ces champs sont en lecture seule.</text>

  <!-- Section: Sécurité -->
  <rect x="490" y="626" width="720" height="112" rx="20" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="524" y="658" fill="#1F2937" font-size="16" font-weight="600">Sécurité</text>
  <line x1="524" y1="671" x2="1176" y2="671" stroke="#F5E6DC" stroke-width="1"/>

  <rect x="524" y="685" width="230" height="38" rx="16" fill="#FFFFFF" stroke="#2A7FD4" stroke-width="1.5"/>
  <text x="550" y="709" fill="#2A7FD4" font-size="13" font-weight="500">Modifier mon mot de passe</text>
  <text x="774" y="709" fill="#9CA3AF" font-size="12">Dernière modification il y a 12 jours</text>

  <!-- Section: Mes données personnelles -->
  <rect x="490" y="754" width="720" height="70" rx="20" fill="#FFFFFF" filter="url(#shadow2)" stroke="#F5E6DC" stroke-width="1"/>
  <text x="524" y="784" fill="#1F2937" font-size="14" font-weight="600">Gérer mes données (RGPD)</text>
  <text x="524" y="804" fill="#6B7280" font-size="12">Exportez ou supprimez vos données personnelles</text>
  <text x="1176" y="794" fill="#F28C5A" font-size="20" text-anchor="end">&#x2192;</text>

  <!-- Footer note -->
  <text x="850" y="852" text-anchor="middle" fill="#9CA3AF" font-size="11" font-style="italic">Pour toute modification de vos informations, contactez votre consultante ou l'administrateur.</text>
</svg>