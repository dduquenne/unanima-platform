  <text x="56" y="344" class="font" fill="#5A5A5A" font-size="12">La societe Link's Accompagnement, SAS au capital de 10 000 euros,</text>
  <text x="56" y="362" class="font" fill="#5A5A5A" font-size="12">immatriculee au RCS de Paris sous le numero 912 345 678, dont le</text>
  <text x="56" y="380" class="font" fill="#5A5A5A" font-size="12">siege social est situe au 42 rue de la Formation, 75008 Paris, est</text>
