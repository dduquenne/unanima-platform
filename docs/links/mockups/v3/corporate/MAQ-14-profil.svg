  <rect x="530" y="502" width="195" height="36" rx="4" fill="#F2F4F7" stroke="#E5E7EB" stroke-width="1"/>
  <text x="544" y="525" fill="#374151" font-size="13">Dupont</text>

  <text x="745" y="496" fill="#6B7280" font-size="11" font-weight="600" letter-spacing="0.5">PRENOM</text>
  <rect x="745" y="502" width="195" height="36" rx="4" fill="#F2F4F7" stroke="#E5E7EB" stroke-width="1"/>
  <text x="759" y="525" fill="#374151" font-size="13">Marie</text>

  <text x="960" y="496" fill="#6B7280" font-size="11" font-weight="600" letter-spacing="0.5">EMAIL</text>
  <rect x="960" y="502" width="205" height="36" rx="4" fill="#F2F4F7" stroke="#E5E7EB" stroke-width="1"/>
  <text x="974" y="525" fill="#374151" font-size="12">marie.dupont@email.com</text>

  <text x="530" y="564" fill="#9CA3AF" font-size="11">Champs en lecture seule.</text>

  <!-- Section: Sécurité -->
  <rect x="500" y="618" width="700" height="108" rx="6" fill="#FFFFFF" filter="url(#shadow2)"/>
