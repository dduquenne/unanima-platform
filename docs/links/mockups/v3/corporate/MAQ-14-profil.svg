  <text x="780" y="330" fill="#6B7280" font-size="11" font-weight="600" letter-spacing="0.5">CONSULTANTE ASSIGNEE</text>
  <text x="780" y="348" fill="#1A5BA0" font-size="13" font-weight="500">Sophie Martin</text>

