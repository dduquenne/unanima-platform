  <text x="556" y="695" fill="#1A5BA0" font-size="12" font-weight="600">Modifier mon mot de passe</text>
  <text x="770" y="695" fill="#9CA3AF" font-size="12">Dernière modification il y a 12 jours</text>

  <!-- Section: Mes données -->
  <rect x="500" y="744" width="700" height="64" rx="6" fill="#FFFFFF" filter="url(#shadow2)" stroke="#E5E7EB" stroke-width="1"/>
  <text x="530" y="771" fill="#111827" font-size="13" font-weight="700">Gérer mes données (RGPD)</text>
  <text x="530" y="790" fill="#6B7280" font-size="12">Exercez vos droits sur vos données personnelles</text>
  <text x="1170" y="780" fill="#6B7280" font-size="16" text-anchor="end">&#x2192;</text>

  <!-- Footer -->
  <text x="855" y="838" text-anchor="middle" fill="#9CA3AF" font-size="11">Pour toute modification de vos informations, contactez votre consultante ou l'administrateur.</text>
</svg>