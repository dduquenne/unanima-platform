<!-- MAQ-10 | Reset Password Request | corporate -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="corpShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
    <filter id="corpCardShadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Left Panel -->
  <rect x="0" y="0" width="600" height="900" fill="#0D3B6E"/>

  <!-- Corporate horizontal rules -->
  <line x1="60" y1="120" x2="540" y2="120" stroke="#1A5BA0" stroke-width="0.5" opacity="0.25"/>
  <line x1="60" y1="200" x2="540" y2="200" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="680" x2="540" y2="680" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="760" x2="540" y2="760" stroke="#1A5BA0" stroke-width="0.5" opacity="0.25"/>
  <rect x="60" y="140" width="80" height="2" fill="#E5622E" opacity="0.4"/>
  <rect x="460" y="700" width="80" height="2" fill="#E5622E" opacity="0.3"/>

  <!-- Logo -->
  <text x="300" y="400" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="700" letter-spacing="0.5">Link's</text>
  <text x="300" y="438" text-anchor="middle" fill="#FFFFFF" font-size="21" font-weight="300" letter-spacing="1">Accompagnement</text>

  <!-- Orange accent line -->
  <rect x="250" y="455" width="100" height="2" fill="#E5622E"/>

  <!-- Tagline -->
  <text x="300" y="490" text-anchor="middle" fill="#8BAFD4" font-size="13" font-weight="400" letter-spacing="0.3">Votre parcours de bilan de compétences,</text>
  <text x="300" y="510" text-anchor="middle" fill="#8BAFD4" font-size="13" font-weight="400" letter-spacing="0.3">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#F2F4F7"/>

  <!-- Form container -->
  <!-- Back link -->
  <text x="820" y="285" fill="#1A5BA0" font-size="13" font-weight="500">← Retour à la connexion</text>

  <!-- Title -->
  <text x="820" y="345" fill="#111827" font-size="26" font-weight="700" letter-spacing="0.2">Mot de passe oublié ?</text>

  <!-- Subtitle - formal -->
  <text x="820" y="378" fill="#6B7280" font-size="13" font-weight="400">Veuillez saisir votre adresse email. Si elle est associée à un</text>
  <text x="820" y="398" fill="#6B7280" font-size="13" font-weight="400">compte existant, un lien de réinitialisation vous sera envoyé.</text>

  <!-- Email field -->
  <text x="820" y="442" fill="#374151" font-size="12" font-weight="600" letter-spacing="0.3">ADRESSE EMAIL</text>
  <rect x="820" y="454" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#corpShadow)"/>
  <text x="836" y="480" fill="#9CA3AF" font-size="13">votre@email.com</text>

  <!-- Submit button -->
  <rect x="820" y="516" width="400" height="44" rx="4" fill="#1A5BA0"/>
  <text x="1020" y="543" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600" letter-spacing="0.3">Envoyer le lien</text>

  <!-- Success state card -->
  <rect x="795" y="598" width="450" height="195" rx="6" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1" filter="url(#corpCardShadow)"/>

  <!-- Green check circle -->
  <circle cx="1020" cy="645" r="22" fill="#ECFDF5"/>
  <circle cx="1020" cy="645" r="14" fill="#10B981"/>
  <text x="1020" y="651" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">✓</text>

  <!-- Success title -->
  <text x="1020" y="690" text-anchor="middle" fill="#065F46" font-size="17" font-weight="700">Email envoyé !</text>

  <!-- Success message -->
  <text x="1020" y="715" text-anchor="middle" fill="#6B7280" font-size="12">Si cette adresse est associée à un compte, vous recevrez un lien</text>
  <text x="1020" y="733" text-anchor="middle" fill="#6B7280" font-size="12">de réinitialisation dans quelques minutes.</text>
  <text x="1020" y="751" text-anchor="middle" fill="#6B7280" font-size="12">Pensez à vérifier vos courriers indésirables.</text>

  <!-- Return to login link -->
  <text x="1020" y="782" text-anchor="middle" fill="#1A5BA0" font-size="13" font-weight="600">Retour à la connexion</text>
</svg>
