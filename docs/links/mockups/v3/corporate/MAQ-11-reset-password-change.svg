<!-- MAQ-11 | Reset Password Change | corporate -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="corpShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Left Panel -->
  <rect x="0" y="0" width="600" height="900" fill="#0D3B6E"/>

  <!-- Corporate horizontal rules -->
  <line x1="60" y1="120" x2="540" y2="120" stroke="#1A5BA0" stroke-width="0.5" opacity="0.25"/>
  <line x1="60" y1="200" x2="540" y2="200" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="680" x2="540" y2="680" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="760" x2="540" y2="760" stroke="#1A5BA0" stroke-width="0.5" opacity="0.25"/>
  <rect x="60" y="140" width="80" height="2" fill="#E5622E" opacity="0.4"/>
  <rect x="460" y="700" width="80" height="2" fill="#E5622E" opacity="0.3"/>

  <!-- Logo -->
  <text x="300" y="400" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="700" letter-spacing="0.5">Link's</text>
  <text x="300" y="438" text-anchor="middle" fill="#FFFFFF" font-size="21" font-weight="300" letter-spacing="1">Accompagnement</text>
  <rect x="250" y="455" width="100" height="2" fill="#E5622E"/>
  <text x="300" y="490" text-anchor="middle" fill="#8BAFD4" font-size="13" font-weight="400" letter-spacing="0.3">Votre parcours de bilan de compétences,</text>
  <text x="300" y="510" text-anchor="middle" fill="#8BAFD4" font-size="13" font-weight="400" letter-spacing="0.3">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#F2F4F7"/>

  <!-- Title -->
  <text x="820" y="235" fill="#111827" font-size="26" font-weight="700" letter-spacing="0.2">Créer un nouveau mot de passe</text>

  <!-- Subtitle -->
  <text x="820" y="265" fill="#6B7280" font-size="13" font-weight="400">Veuillez choisir un mot de passe sécurisé pour votre compte.</text>

  <!-- Field 1: Nouveau mot de passe -->
  <text x="820" y="310" fill="#374151" font-size="12" font-weight="600" letter-spacing="0.3">NOUVEAU MOT DE PASSE</text>
  <rect x="820" y="322" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#corpShadow)"/>
  <text x="836" y="348" fill="#1A1A2E" font-size="13">••••••••••••</text>
  <!-- Visibility toggle -->
  <circle cx="1196" cy="343" r="9" fill="none" stroke="#9CA3AF" stroke-width="1"/>
  <circle cx="1196" cy="343" r="3" fill="#9CA3AF"/>

  <!-- Password strength indicator - structured/minimal -->
  <rect x="820" y="374" width="128" height="3" rx="1.5" fill="#10B981"/>
  <rect x="954" y="374" width="128" height="3" rx="1.5" fill="#10B981"/>
  <rect x="1088" y="374" width="132" height="3" rx="1.5" fill="#10B981"/>
  <text x="1220" y="374" fill="#10B981" font-size="11" font-weight="600" text-anchor="end" dy="-3">FORT</text>

  <!-- Criteria checklist -->
  <circle cx="828" cy="398" r="6" fill="#ECFDF5"/>
  <text x="828" y="401" text-anchor="middle" fill="#10B981" font-size="8" font-weight="700">✓</text>
  <text x="842" y="402" fill="#374151" font-size="11">Au moins 8 caractères</text>

  <circle cx="828" cy="416" r="6" fill="#ECFDF5"/>
  <text x="828" y="419" text-anchor="middle" fill="#10B981" font-size="8" font-weight="700">✓</text>
  <text x="842" y="420" fill="#374151" font-size="11">Au moins 1 majuscule</text>

  <circle cx="828" cy="434" r="6" fill="#ECFDF5"/>
  <text x="828" y="437" text-anchor="middle" fill="#10B981" font-size="8" font-weight="700">✓</text>
  <text x="842" y="438" fill="#374151" font-size="11">Au moins 1 chiffre</text>

  <!-- Field 2: Confirmer le mot de passe -->
  <text x="820" y="472" fill="#374151" font-size="12" font-weight="600" letter-spacing="0.3">CONFIRMER LE MOT DE PASSE</text>
  <rect x="820" y="484" width="400" height="42" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#corpShadow)"/>
  <text x="836" y="510" fill="#1A1A2E" font-size="13">••••••••••••</text>
  <!-- Green check for match -->
  <circle cx="1196" cy="505" r="9" fill="#ECFDF5"/>
  <text x="1196" y="509" text-anchor="middle" fill="#10B981" font-size="11" font-weight="700">✓</text>

  <!-- Submit button -->
  <rect x="820" y="550" width="400" height="44" rx="4" fill="#1A5BA0"/>
  <text x="1020" y="577" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600" letter-spacing="0.3">Modifier mon mot de passe</text>

  <!-- Redirect text -->
  <text x="1020" y="616" text-anchor="middle" fill="#9CA3AF" font-size="12">Vous serez redirigé vers la page de connexion.</text>
</svg>
