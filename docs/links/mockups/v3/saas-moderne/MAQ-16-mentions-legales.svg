  <text x="120" y="796" class="font" font-size="14" font-weight="600" fill="#FFFFFF">Link's Accompagnement</text>
  <text x="120" y="818" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">Plateforme de suivi des bilans de competences</text>

  <text x="600" y="796" class="font" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">Pages legales</text>
  <text x="600" y="818" class="font" font-size="12" font-weight="400" fill="#FF6B35">Mentions legales</text>
  <text x="600" y="838" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">Politique de confidentialite</text>
  <text x="600" y="858" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">Gestion des cookies</text>

  <text x="900" y="796" class="font" font-size="12" font-weight="500" fill="rgba(255,255,255,0.7)">Contact</text>
  <text x="900" y="818" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">contact@links-accompagnement.fr</text>
  <text x="900" y="838" class="font" font-size="12" font-weight="400" fill="rgba(255,255,255,0.5)">+33 (0)1 23 45 67 89</text>

  <line x1="120" y1="870" x2="1320" y2="870" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="120" y="890" class="font" font-size="11" font-weight="400" fill="rgba(255,255,255,0.35)">2026 Link's Accompagnement. Tous droits reserves.</text>
