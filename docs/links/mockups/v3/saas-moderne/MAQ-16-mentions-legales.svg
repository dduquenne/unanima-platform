  <rect x="120" y="386" width="600" height="180" rx="10" fill="#FFFFFF" filter="url(#shadow1)" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="120" y="386" width="600" height="4" rx="10" fill="#1E6FC0"/>
  <text x="148" y="420" class="font" font-size="16" font-weight="600" fill="#1A1A2E">Hebergement</text>
