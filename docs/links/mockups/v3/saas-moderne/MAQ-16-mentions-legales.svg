  <text x="148" y="674" class="font" font-size="13" font-weight="400" fill="#6B7280">1978 modifiee, vous disposez d'un droit d'acces, de rectification, de suppression et de portabilite de vos donnees personnelles,</text>
  <text x="148" y="694" class="font" font-size="13" font-weight="400" fill="#6B7280">ainsi que d'un droit d'opposition et de limitation du traitement. Pour exercer ces droits, contactez-nous a :</text>
  <text x="148" y="718" class="font" font-size="13" font-weight="500" fill="#1E6FC0">dpo@links-accompagnement.fr</text>

