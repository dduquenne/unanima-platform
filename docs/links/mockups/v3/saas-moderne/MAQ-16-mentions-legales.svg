      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .font { font-family: 'Inter', Arial, Helvetica, sans-serif; }
    </style>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <clipPath id="logoClip"><rect x="0" y="0" width="1440" height="56" rx="0"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#FAFBFC"/>

  <!-- Header Bar -->
