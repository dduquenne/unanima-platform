  <rect x="0" y="54" width="1440" height="2" fill="#FF6B35"/>

  <!-- Logo -->
  <text x="80" y="36" class="font" font-size="22" font-weight="700" fill="#FFFFFF">Link's</text>
  <rect x="142" y="22" width="4" height="18" rx="2" fill="#FF6B35"/>
  <text x="154" y="36" class="font" font-size="14" font-weight="400" fill="rgba(255,255,255,0.85)">Accompagnement</text>

  <!-- Nav items -->
  <text x="1150" y="35" class="font" font-size="13" font-weight="500" fill="rgba(255,255,255,0.8)">Accueil</text>
  <text x="1230" y="35" class="font" font-size="13" font-weight="500" fill="rgba(255,255,255,0.8)">Contact</text>
  <text x="1310" y="35" class="font" font-size="13" font-weight="500" fill="#FF6B35">Connexion</text>

  <!-- Page Title Area -->
