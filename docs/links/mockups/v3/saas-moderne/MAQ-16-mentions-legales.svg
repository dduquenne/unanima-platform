  <text x="120" y="126" class="font" font-size="13" font-weight="400" fill="#6B7280">Informations legales conformement a la loi n 2004-575 du 21 juin 2004</text>

  <!-- Main Content Area -->
  <!-- Card 1: Editeur du site -->
  <rect x="120" y="156" width="600" height="210" rx="10" fill="#FFFFFF" filter="url(#shadow1)" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="120" y="156" width="600" height="4" rx="10" fill="#1E6FC0"/>
  <text x="148" y="190" class="font" font-size="16" font-weight="600" fill="#1A1A2E">Editeur du site</text>
  <line x1="148" y1="200" x2="692" y2="200" stroke="#F0F4F8" stroke-width="1"/>
  <text x="148" y="224" class="font" font-size="13" font-weight="500" fill="#374151">Raison sociale</text>
  <text x="320" y="224" class="font" font-size="13" font-weight="400" fill="#6B7280">Link's Accompagnement</text>
  <text x="148" y="248" class="font" font-size="13" font-weight="500" fill="#374151">Forme juridique</text>
  <text x="320" y="248" class="font" font-size="13" font-weight="400" fill="#6B7280">SAS au capital de 10 000 euros</text>
  <text x="148" y="272" class="font" font-size="13" font-weight="500" fill="#374151">SIRET</text>
  <text x="320" y="272" class="font" font-size="13" font-weight="400" fill="#6B7280">123 456 789 00012</text>
  <text x="148" y="296" class="font" font-size="13" font-weight="500" fill="#374151">Siege social</text>
  <text x="320" y="296" class="font" font-size="13" font-weight="400" fill="#6B7280">12 rue de la Paix, 75002 Paris, France</text>
  <text x="148" y="320" class="font" font-size="13" font-weight="500" fill="#374151">RCS</text>
  <text x="320" y="320" class="font" font-size="13" font-weight="400" fill="#6B7280">Paris B 123 456 789</text>
  <text x="148" y="344" class="font" font-size="13" font-weight="500" fill="#374151">N TVA</text>
  <text x="320" y="344" class="font" font-size="13" font-weight="400" fill="#6B7280">FR 12 123456789</text>

