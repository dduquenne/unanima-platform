  <text x="940" y="224" class="font" font-size="13" font-weight="400" fill="#6B7280">Mme Sophie Martin</text>
  <text x="768" y="248" class="font" font-size="13" font-weight="500" fill="#374151">Qualite</text>
  <text x="940" y="248" class="font" font-size="13" font-weight="400" fill="#6B7280">Presidente de Link's Accompagnement</text>
