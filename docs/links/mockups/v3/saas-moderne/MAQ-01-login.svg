<!-- MAQ-01 | Login | Link's Accompagnement | v3.0 | saas-moderne | 2026-03-26 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Subtle shadow for card -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <!-- Input shadow on focus -->
    <filter id="inputFocus" x="-5%" y="-10%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#1E6FC0" flood-opacity="0.12"/>
    </filter>
    <!-- Button shadow -->
    <filter id="btnShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1E6FC0" flood-opacity="0.25"/>
    </filter>
    <!-- Geometric decoration circles -->
    <clipPath id="leftPanel">
      <rect x="0" y="0" width="640" height="900"/>
    </clipPath>
  </defs>

  <!-- ============================================ -->
  <!-- RIGHT PANEL: Login form area                 -->
  <!-- ============================================ -->
  <rect x="0" y="0" width="1440" height="900" fill="#FAFBFC"/>

  <!-- ============================================ -->
  <!-- LEFT PANEL: Branding                         -->
  <!-- ============================================ -->
  <rect x="0" y="0" width="640" height="900" fill="#0D3B6E"/>

  <!-- Geometric abstract decoration -->
  <g clip-path="url(#leftPanel)" opacity="0.08">
    <circle cx="120" cy="150" r="180" fill="#FFFFFF" stroke="none"/>
    <circle cx="500" cy="700" r="220" fill="#FFFFFF" stroke="none"/>
    <circle cx="580" cy="200" r="80" fill="#FFFFFF" stroke="none"/>
    <circle cx="60" cy="600" r="100" fill="#FFFFFF" stroke="none"/>
    <line x1="100" y1="350" x2="540" y2="350" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="100" y1="380" x2="450" y2="380" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="200" y1="500" x2="600" y2="500" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="150" y1="530" x2="500" y2="530" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
  <g clip-path="url(#leftPanel)" opacity="0.05">
    <circle cx="320" cy="450" r="300" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="320" cy="450" r="200" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
    <circle cx="320" cy="450" r="100" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <text x="0" y="0" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="0.3">Link's</text>
    <text x="90" y="0" font-size="28" font-weight="400" fill="#A8C8F0" letter-spacing="0.3">Accompagnement</text>
    <!-- Orange accent polygon -->
    <polygon points="78,-22 88,-22 84,-4 74,-4" fill="#FF6B35"/>
  </g>

  <!-- Tagline -->
  <text x="80" y="130" font-size="18" font-weight="400" fill="#A8C8F0" opacity="0.9">Plateforme de suivi des bilans</text>
  <text x="80" y="155" font-size="18" font-weight="400" fill="#A8C8F0" opacity="0.9">de compétences</text>

  <!-- Decorative illustration: Abstract connected nodes -->
  <g transform="translate(180, 350)" opacity="0.6">
    <!-- Nodes -->
    <circle cx="0" cy="0" r="8" fill="#FF6B35"/>
    <circle cx="120" cy="-60" r="6" fill="#A8C8F0"/>
    <circle cx="200" cy="20" r="10" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="80" cy="80" r="7" fill="#A8C8F0"/>
    <circle cx="240" cy="-30" r="5" fill="#FF6B35" opacity="0.7"/>
    <circle cx="160" cy="100" r="8" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="-40" cy="80" r="5" fill="#A8C8F0" opacity="0.5"/>
    <circle cx="280" cy="60" r="6" fill="#A8C8F0" opacity="0.4"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="120" y2="-60" stroke="#A8C8F0" stroke-width="1" opacity="0.4"/>
    <line x1="120" y1="-60" x2="200" y2="20" stroke="#A8C8F0" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="80" y2="80" stroke="#A8C8F0" stroke-width="1" opacity="0.4"/>
    <line x1="80" y1="80" x2="160" y2="100" stroke="#A8C8F0" stroke-width="1" opacity="0.3"/>
    <line x1="200" y1="20" x2="240" y2="-30" stroke="#A8C8F0" stroke-width="1" opacity="0.3"/>
    <line x1="200" y1="20" x2="280" y2="60" stroke="#A8C8F0" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-40" y2="80" stroke="#A8C8F0" stroke-width="1" opacity="0.3"/>
    <line x1="120" y1="-60" x2="240" y2="-30" stroke="#A8C8F0" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Abstract person silhouettes -->
  <g transform="translate(100, 550)" opacity="0.15">
    <!-- Person 1 -->
    <circle cx="40" cy="0" r="18" fill="#FFFFFF"/>
    <rect x="22" y="22" width="36" height="50" rx="12" fill="#FFFFFF"/>
    <!-- Person 2 -->
    <circle cx="120" cy="-10" r="18" fill="#FFFFFF"/>
    <rect x="102" y="12" width="36" height="50" rx="12" fill="#FFFFFF"/>
    <!-- Person 3 -->
    <circle cx="200" cy="5" r="18" fill="#FFFFFF"/>
    <rect x="182" y="27" width="36" height="50" rx="12" fill="#FFFFFF"/>
    <!-- Connection arcs -->
    <path d="M58,10 Q90,-20 102,2" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
    <path d="M138,0 Q170,-25 182,15" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Left panel footer -->
  <text x="80" y="840" font-size="12" fill="#A8C8F0" opacity="0.5">© 2026 Link's Accompagnement</text>

  <!-- Vertical separator line -->
  <line x1="640" y1="0" x2="640" y2="900" stroke="#E8ECF1" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- RIGHT PANEL: Login form                      -->
  <!-- ============================================ -->

  <!-- Form card container -->
  <g filter="url(#cardShadow)">
    <rect x="820" y="200" width="420" height="500" rx="12" ry="12" fill="#FFFFFF"/>
  </g>

  <!-- Form heading -->
  <text x="1030" y="262" font-size="26" font-weight="700" fill="#1A2332" text-anchor="middle" letter-spacing="-0.3">Connexion</text>
  <text x="1030" y="290" font-size="14" font-weight="400" fill="#8492A6" text-anchor="middle">Accédez à votre espace personnel</text>

  <!-- Email field -->
  <text x="860" y="345" font-size="13" font-weight="600" fill="#4A5568" letter-spacing="0.3">Adresse e-mail</text>
  <rect x="860" y="355" width="340" height="46" rx="8" ry="8" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1.5"/>
  <!-- Email icon -->
  <g transform="translate(876, 369)">
    <rect x="0" y="2" width="18" height="14" rx="2" fill="none" stroke="#B0B8C4" stroke-width="1.5"/>
    <polyline points="0,3 9,11 18,3" fill="none" stroke="#B0B8C4" stroke-width="1.5"/>
  </g>
  <text x="904" y="383" font-size="14" fill="#B0B8C4">votre@email.com</text>

  <!-- Password field -->
  <text x="860" y="430" font-size="13" font-weight="600" fill="#4A5568" letter-spacing="0.3">Mot de passe</text>
  <rect x="860" y="440" width="340" height="46" rx="8" ry="8" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1.5"/>
  <!-- Lock icon -->
  <g transform="translate(876, 453)">
    <rect x="2" y="8" width="14" height="11" rx="2" fill="none" stroke="#B0B8C4" stroke-width="1.5"/>
    <path d="M5,8 V5 a4,4 0 0 1 8,0 V8" fill="none" stroke="#B0B8C4" stroke-width="1.5"/>
    <circle cx="9" cy="14" r="1.5" fill="#B0B8C4"/>
  </g>
  <text x="904" y="468" font-size="14" fill="#B0B8C4">••••••••</text>
  <!-- Visibility toggle (eye icon) -->
  <g transform="translate(1168, 454)">
    <ellipse cx="10" cy="9" rx="10" ry="7" fill="none" stroke="#B0B8C4" stroke-width="1.5"/>
    <circle cx="10" cy="9" r="3.5" fill="none" stroke="#B0B8C4" stroke-width="1.5"/>
  </g>

  <!-- Error message area (shown as example) -->
  <g opacity="0">
    <rect x="860" y="498" width="340" height="40" rx="8" fill="#FEF2F2"/>
    <text x="880" y="523" font-size="13" fill="#DC2626">Identifiants incorrects. Veuillez réessayer.</text>
  </g>

  <!-- Se connecter button -->
  <g filter="url(#btnShadow)">
    <rect x="860" y="510" width="340" height="48" rx="8" ry="8" fill="#1E6FC0"/>
  </g>
  <text x="1030" y="540" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.3">Se connecter</text>

  <!-- Mot de passe oublié link -->
  <text x="1030" y="590" font-size="13" font-weight="500" fill="#1E6FC0" text-anchor="middle" opacity="0.9">Mot de passe oublié ?</text>

  <!-- Error message area (visible variant for demonstration) -->
  <rect x="860" y="615" width="340" height="42" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <g transform="translate(876, 630)">
    <!-- Warning icon -->
    <circle cx="8" cy="8" r="8" fill="#DC2626" opacity="0.15"/>
    <text x="8" y="12" font-size="11" font-weight="700" fill="#DC2626" text-anchor="middle">!</text>
  </g>
  <text x="900" y="641" font-size="12.5" fill="#DC2626">Identifiants incorrects. Veuillez réessayer.</text>

  <!-- ============================================ -->
  <!-- FOOTER                                       -->
  <!-- ============================================ -->
  <line x1="660" y1="860" x2="1420" y2="860" stroke="#E8ECF1" stroke-width="1"/>
  <text x="950" y="882" font-size="12" fill="#8492A6" text-anchor="middle">Mentions légales</text>
  <text x="1030" y="882" font-size="12" fill="#B0B8C4" text-anchor="middle">|</text>
  <text x="1110" y="882" font-size="12" fill="#8492A6" text-anchor="middle">Confidentialité</text>
  <text x="1180" y="882" font-size="12" fill="#B0B8C4" text-anchor="middle">|</text>
  <text x="1235" y="882" font-size="12" fill="#8492A6" text-anchor="middle">Cookies</text>
</svg>
