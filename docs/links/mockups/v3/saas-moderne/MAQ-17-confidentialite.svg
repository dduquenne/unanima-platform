  <circle cx="348" cy="436" r="3" fill="#1E6FC0"/>
  <text x="360" y="440" class="font text-body">Administration des questionnaires d'auto-evaluation et collecte des reponses</text>
  <circle cx="348" cy="456" r="3" fill="#1E6FC0"/>
