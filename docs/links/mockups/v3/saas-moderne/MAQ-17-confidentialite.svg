  <line x1="336" y1="752" x2="1036" y2="752" class="divider" opacity="0.5"/>
  <text x="350" y="762" class="font text-body" font-size="11">Donnees de compte utilisateur</text>
  <text x="620" y="762" class="font text-body" font-size="11">Duree du contrat + 3 ans</text>
  <text x="820" y="762" class="font text-body" font-size="11">Prescription civile</text>

  <!-- Article 7 - Droits -->
  <g class="card-shadow">
