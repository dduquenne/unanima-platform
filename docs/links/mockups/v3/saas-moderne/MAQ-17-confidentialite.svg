    <path d="M18 8 L28 13 V20 C28 25 24 29 18 31 C12 29 8 25 8 20 V13 Z" fill="none" stroke="#1E6FC0" stroke-width="1.5"/>
    <path d="M14 20 L17 23 L23 16" fill="none" stroke="#1E6FC0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
