  <circle cx="72" cy="450" r="3" class="toc-dot"/>
  <text x="84" y="454" class="font toc-item">8. Cookies</text>

  <circle cx="72" cy="480" r="3" class="toc-dot"/>
  <text x="84" y="484" class="font toc-item">9. Securite des donnees</text>

  <circle cx="72" cy="510" r="3" class="toc-dot"/>
  <text x="84" y="514" class="font toc-item">10. Contact DPO</text>

