  <text x="72" y="586" class="font" fill="#1E6FC0" font-size="12" font-weight="600">des Donnees (DPO)</text>
  <text x="72" y="608" class="font text-body" font-size="11">M. Jean-Pierre Martin</text>
  <text x="72" y="624" class="font text-body" font-size="11">dpo@links-accompagnement.fr</text>
