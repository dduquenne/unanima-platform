  <text x="414" y="206" class="font badge-text">Responsable du traitement</text>
  <text x="336" y="232" class="font text-body">La societe Link's Accompagnement, SAS au capital de 10 000 euros, immatriculee au RCS de Paris</text>
  <text x="336" y="248" class="font text-body">sous le numero 912 345 678, dont le siege social est situe au 42 rue de la Formation, 75008 Paris,</text>
  <text x="336" y="264" class="font text-body">est responsable du traitement de vos donnees personnelles collectees via la plateforme de suivi</text>
