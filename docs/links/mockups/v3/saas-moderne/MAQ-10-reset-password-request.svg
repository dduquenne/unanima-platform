<!-- MAQ-10 | Reset Password Request | saas-moderne -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Left Panel - Dark Blue Branding -->
  <rect x="0" y="0" width="600" height="900" fill="#0D3B6E"/>

  <!-- Geometric decorations - circles and lines -->
  <circle cx="100" cy="150" r="80" fill="none" stroke="#1A5BA0" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="150" r="120" fill="none" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <circle cx="480" cy="750" r="100" fill="none" stroke="#1A5BA0" stroke-width="1" opacity="0.25"/>
  <circle cx="480" cy="750" r="60" fill="none" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="400" x2="250" y2="400" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="350" y1="300" x2="550" y2="300" stroke="#1A5BA0" stroke-width="0.5" opacity="0.15"/>
  <circle cx="300" cy="450" r="4" fill="#FF6B35" opacity="0.4"/>
  <circle cx="200" cy="600" r="3" fill="#FF6B35" opacity="0.3"/>

  <!-- Logo -->
  <text x="300" y="390" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="700">Link's</text>
  <text x="300" y="430" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="300">Accompagnement</text>

  <!-- Orange accent line -->
  <rect x="240" y="450" width="120" height="3" rx="1.5" fill="#FF6B35"/>

  <!-- Tagline -->
  <text x="300" y="490" text-anchor="middle" fill="#8BAFD4" font-size="14" font-weight="400">Votre parcours de bilan de compétences,</text>
  <text x="300" y="512" text-anchor="middle" fill="#8BAFD4" font-size="14" font-weight="400">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#FAFBFC"/>

  <!-- Form container centered -->
  <!-- Back link -->
  <text x="820" y="280" fill="#1E6FC0" font-size="14" font-weight="500" style="cursor:pointer">← Retour à la connexion</text>

  <!-- Title -->
  <text x="820" y="340" fill="#1A1A2E" font-size="28" font-weight="700">Mot de passe oublié ?</text>

  <!-- Subtitle -->
  <text x="820" y="375" fill="#6B7280" font-size="14" font-weight="400">Saisissez votre adresse email. Si elle est associée à un</text>
  <text x="820" y="395" fill="#6B7280" font-size="14" font-weight="400">compte, vous recevrez un lien de réinitialisation.</text>

  <!-- Email field -->
  <text x="820" y="445" fill="#374151" font-size="13" font-weight="500">Adresse email</text>
  <rect x="820" y="455" width="400" height="44" rx="8" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1" filter="url(#shadow1)"/>
  <text x="836" y="482" fill="#9CA3AF" font-size="14">votre@email.com</text>

  <!-- Submit button -->
  <rect x="820" y="520" width="400" height="46" rx="8" fill="#1E6FC0"/>
  <text x="1020" y="548" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">Envoyer le lien</text>

  <!-- Success state card -->
  <rect x="790" y="600" width="460" height="200" rx="10" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1" filter="url(#shadow2)"/>

  <!-- Green check circle -->
  <circle cx="1020" cy="650" r="24" fill="#ECFDF5"/>
  <circle cx="1020" cy="650" r="16" fill="#10B981"/>
  <text x="1020" y="656" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">✓</text>

  <!-- Success title -->
  <text x="1020" y="698" text-anchor="middle" fill="#065F46" font-size="18" font-weight="700">Email envoyé !</text>

  <!-- Success message -->
  <text x="1020" y="724" text-anchor="middle" fill="#6B7280" font-size="13">Si cette adresse est associée à un compte, vous recevrez</text>
  <text x="1020" y="742" text-anchor="middle" fill="#6B7280" font-size="13">un lien de réinitialisation dans quelques minutes.</text>
  <text x="1020" y="762" text-anchor="middle" fill="#6B7280" font-size="13">Pensez à vérifier vos spams.</text>

  <!-- Return to login link -->
  <text x="1020" y="790" text-anchor="middle" fill="#1E6FC0" font-size="14" font-weight="500">Retour à la connexion</text>
</svg>
