  <rect x="750" y="506" width="200" height="36" rx="8" fill="#F9FAFB"/>
  <text x="764" y="529" fill="#374151" font-size="13">Marie</text>

  <text x="970" y="500" fill="#6B7280" font-size="12" font-weight="500">Email</text>
  <rect x="970" y="506" width="200" height="36" rx="8" fill="#F9FAFB"/>
  <text x="984" y="529" fill="#374151" font-size="13">marie.dupont@email.com</text>

  <text x="530" y="565" fill="#9CA3AF" font-size="11" font-style="italic">Ces champs sont en lecture seule.</text>

  <!-- Section: Sécurité -->
  <rect x="500" y="618" width="700" height="110" rx="10" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="530" y="650" fill="#111827" font-size="16" font-weight="600">Sécurité</text>
  <line x1="530" y1="663" x2="1170" y2="663" stroke="#E5E7EB" stroke-width="1"/>

  <rect x="530" y="675" width="220" height="36" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="555" y="698" fill="#374151" font-size="13" font-weight="500">Modifier mon mot de passe</text>
  <text x="770" y="698" fill="#9CA3AF" font-size="12">Dernière modification il y a 12 jours</text>

  <!-- Section: Mes données personnelles -->
  <rect x="500" y="746" width="700" height="70" rx="10" fill="#FFFFFF" filter="url(#shadow2)" stroke="#E5E7EB" stroke-width="1"/>
  <text x="530" y="775" fill="#111827" font-size="14" font-weight="600">Gérer mes données (RGPD)</text>
  <text x="530" y="795" fill="#6B7280" font-size="12">Exportez ou supprimez vos données personnelles</text>
  <text x="1160" y="785" fill="#6B7280" font-size="18" text-anchor="end">&#x2192;</text>

  <!-- Footer note -->
  <text x="850" y="845" text-anchor="middle" fill="#9CA3AF" font-size="11" font-style="italic">Pour toute modification de vos informations, contactez votre consultante ou l'administrateur.</text>
