  <!-- Info rows -->
  <!-- Email -->
  <rect x="555" y="260" width="390" height="20" fill="none"/>
  <text x="575" y="275" fill="#6B7280" font-size="13">&#x2709;</text>
  <text x="595" y="275" fill="#4B5563" font-size="13">marie.dupont@email.com</text>

  <!-- Phone -->
  <text x="575" y="298" fill="#6B7280" font-size="13">&#x260E;</text>
