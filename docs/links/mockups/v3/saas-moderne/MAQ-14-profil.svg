  <text x="755" y="344" fill="#1E6FC0" font-size="13" font-weight="500">Sophie Martin</text>

  <!-- Right side info -->
  <text x="980" y="275" fill="#6B7280" font-size="13">&#x260E;</text>
  <text x="1000" y="275" fill="#4B5563" font-size="13">06 12 34 56 78</text>

  <!-- Section: Informations personnelles -->
  <rect x="500" y="430" width="700" height="170" rx="10" fill="#FFFFFF" filter="url(#shadow2)"/>
  <text x="530" y="462" fill="#111827" font-size="16" font-weight="600">Informations personnelles</text>
  <line x1="530" y1="475" x2="1170" y2="475" stroke="#E5E7EB" stroke-width="1"/>

