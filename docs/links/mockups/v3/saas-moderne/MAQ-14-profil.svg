  <circle cx="30" cy="252" r="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="30" cy="249" r="3" fill="#FFFFFF"/>
  <path d="M24,257 Q24,253 30,253 Q36,253 36,257" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="48" y="257" fill="#FFFFFF" font-size="13" font-weight="600">Profil</text>

