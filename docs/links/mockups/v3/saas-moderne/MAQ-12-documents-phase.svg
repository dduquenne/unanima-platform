        <text x="872" y="28" font-size="11" font-weight="600" fill="#8899AA" text-anchor="middle">À venir</text>
        <line x1="20" y1="42" x2="900" y2="42" stroke="#EDF2F7" stroke-width="1"/>
        <text x="20" y="62" font-size="13" font-style="italic" fill="#A0AEC0">Aucun document disponible pour cette phase.</text>
      </g>

      <!-- Phase 6 -->
