        <rect x="0" y="0" width="920" height="76" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow1)"/>
        <rect x="0" y="0" width="4" height="76" rx="2" fill="#CBD5E0"/>
        <text x="20" y="28" font-size="15" font-weight="700" fill="#1A202C">Phase 6</text>
        <text x="75" y="28" font-size="15" fill="#4A5568">— Synthèse et bilan</text>
