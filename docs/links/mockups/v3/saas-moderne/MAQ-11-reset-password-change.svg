<!-- MAQ-11 | Reset Password Change | saas-moderne -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Left Panel - Dark Blue Branding -->
  <rect x="0" y="0" width="600" height="900" fill="#0D3B6E"/>

  <!-- Geometric decorations -->
  <circle cx="100" cy="150" r="80" fill="none" stroke="#1A5BA0" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="150" r="120" fill="none" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <circle cx="480" cy="750" r="100" fill="none" stroke="#1A5BA0" stroke-width="1" opacity="0.25"/>
  <circle cx="480" cy="750" r="60" fill="none" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="400" x2="250" y2="400" stroke="#1A5BA0" stroke-width="0.5" opacity="0.2"/>
  <line x1="350" y1="300" x2="550" y2="300" stroke="#1A5BA0" stroke-width="0.5" opacity="0.15"/>
  <circle cx="300" cy="450" r="4" fill="#FF6B35" opacity="0.4"/>
  <circle cx="200" cy="600" r="3" fill="#FF6B35" opacity="0.3"/>

  <!-- Logo -->
  <text x="300" y="390" text-anchor="middle" fill="#FFFFFF" font-size="32" font-weight="700">Link's</text>
  <text x="300" y="430" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="300">Accompagnement</text>
  <rect x="240" y="450" width="120" height="3" rx="1.5" fill="#FF6B35"/>
  <text x="300" y="490" text-anchor="middle" fill="#8BAFD4" font-size="14" font-weight="400">Votre parcours de bilan de compétences,</text>
  <text x="300" y="512" text-anchor="middle" fill="#8BAFD4" font-size="14" font-weight="400">simplifié et sécurisé.</text>

  <!-- Right Panel -->
  <rect x="600" y="0" width="840" height="900" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="820" y="230" fill="#1A1A2E" font-size="28" font-weight="700">Créer un nouveau mot de passe</text>

  <!-- Subtitle -->
  <text x="820" y="262" fill="#6B7280" font-size="14" font-weight="400">Choisissez un mot de passe sécurisé pour votre compte.</text>

  <!-- Field 1: Nouveau mot de passe -->
  <text x="820" y="310" fill="#374151" font-size="13" font-weight="500">Nouveau mot de passe</text>
  <rect x="820" y="320" width="400" height="44" rx="8" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1" filter="url(#shadow1)"/>
  <text x="836" y="347" fill="#1A1A2E" font-size="14">••••••••••••</text>
  <!-- Visibility toggle icon -->
  <circle cx="1196" cy="342" r="10" fill="none" stroke="#9CA3AF" stroke-width="1"/>
  <circle cx="1196" cy="342" r="3" fill="#9CA3AF"/>

  <!-- Password strength indicator -->
  <!-- Bar: 3 segments all green (Fort) -->
  <rect x="820" y="376" width="128" height="4" rx="2" fill="#10B981"/>
  <rect x="954" y="376" width="128" height="4" rx="2" fill="#10B981"/>
  <rect x="1088" y="376" width="132" height="4" rx="2" fill="#10B981"/>
  <text x="1220" y="376" fill="#10B981" font-size="12" font-weight="600" text-anchor="end" dy="-4">Fort</text>

  <!-- Criteria checklist -->
  <circle cx="830" cy="402" r="7" fill="#ECFDF5"/>
  <text x="830" y="405" text-anchor="middle" fill="#10B981" font-size="9" font-weight="700">✓</text>
  <text x="845" y="406" fill="#374151" font-size="12">Au moins 8 caractères</text>

  <circle cx="830" cy="422" r="7" fill="#ECFDF5"/>
  <text x="830" y="425" text-anchor="middle" fill="#10B981" font-size="9" font-weight="700">✓</text>
  <text x="845" y="426" fill="#374151" font-size="12">Au moins 1 majuscule</text>

  <circle cx="830" cy="442" r="7" fill="#ECFDF5"/>
  <text x="830" y="445" text-anchor="middle" fill="#10B981" font-size="9" font-weight="700">✓</text>
  <text x="845" y="446" fill="#374151" font-size="12">Au moins 1 chiffre</text>

  <!-- Field 2: Confirmer le mot de passe -->
  <text x="820" y="486" fill="#374151" font-size="13" font-weight="500">Confirmer le mot de passe</text>
  <rect x="820" y="496" width="400" height="44" rx="8" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="836" y="523" fill="#1A1A2E" font-size="14">••••••••••••</text>
  <!-- Green check for match -->
  <circle cx="1196" cy="518" r="10" fill="#ECFDF5"/>
  <text x="1196" y="522" text-anchor="middle" fill="#10B981" font-size="12" font-weight="700">✓</text>

  <!-- Submit button -->
  <rect x="820" y="566" width="400" height="46" rx="8" fill="#1E6FC0"/>
  <text x="1020" y="594" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">Modifier mon mot de passe</text>

  <!-- Redirect text -->
  <text x="1020" y="632" text-anchor="middle" fill="#9CA3AF" font-size="13">Vous serez redirigé vers la page de connexion.</text>
</svg>
