       QUESTION 1
  ════════════════════════════════════════════ -->
  <rect x="32" y="468" width="1376" height="178" rx="8" fill="#FFFFFF" stroke="#DCE1EB" stroke-width="1"/>

  <!-- Numéro de question -->
