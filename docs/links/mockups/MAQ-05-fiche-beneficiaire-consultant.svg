  <text x="68" y="505" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>

  <!-- Texte de la question -->
  <text x="96" y="495" font-size="14" font-weight="600" fill="#0D3B6E">Quelles compétences avez-vous développées au cours de vos expériences professionnelles les plus significatives ?</text>
  <text x="96" y="512" font-size="12" fill="#9CA3AF">Décrivez précisément en vous appuyant sur des exemples concrets.</text>

