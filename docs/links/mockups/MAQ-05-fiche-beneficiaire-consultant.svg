  <rect x="96" y="558" width="1284" height="72" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Texture "no-edit" — coins arrondis et absence de bordure active -->
  <text x="112" y="576" font-size="13" fill="#4A4A4A">
    J'ai développé de solides compétences en gestion de projet lors de mes 5 années en tant que responsable de production chez Textilis. J'ai notamment
  </text>
  <text x="112" y="594" font-size="13" fill="#4A4A4A">
    coordonné des équipes de 12 personnes, géré des plannings complexes et conduit des projets d'optimisation des coûts (-15% en 2024). J'ai aussi
  </text>
  <text x="112" y="612" font-size="13" fill="#4A4A4A">
    acquis des compétences transverses en communication, résolution de problèmes et adaptation au changement.
  </text>

